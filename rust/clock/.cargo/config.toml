# Build configuration for the ESP32-C3 (RISC-V RV32IMC) "smol" firmware.
#
# We build for the bare-metal RISC-V target. esp-hal supplies the linker
# script fragments (memory.x, esp32c3.x, linkall.x) via its build script and
# the `link-arg` flags below wire them into the final link step.

[build]
target = "riscv32imc-unknown-none-elf"

# Host target (build scripts + proc-macros compile for x86_64-linux). This
# machine has a non-compiler `cc` shim earlier on PATH, so pin the real GCC as
# the host linker driver; otherwise host build scripts fail to link with
# "Unknown: -m64".
[target.x86_64-unknown-linux-gnu]
linker = "gcc"

[target.riscv32imc-unknown-none-elf]
# OTA (issue #6): flash the dual-OTA A/B partition table alongside the app. This
# is a DESTRUCTIVE, one-way migration off the single-app layout (spec §6-R2) —
# the first OTA-capable image MUST be USB-flashed WITH this table (§6-R1); after
# that, updates ride OTA. With 3 boards present espflash prompts for the port, so
# pass an explicit --port when flashing a specific board (MAC-guard per §6-R2).
runner = "espflash flash --monitor --partition-table partitions-ota.csv"
# Link the firmware with the bundled rust-lld directly (LLD flavor) instead of
# going through a C compiler driver. This machine's `cc` is a non-compiler
# shim, so we must not route the target link through it.
linker = "rust-lld"
rustflags = [
    "-C", "linker-flavor=ld.lld",
    # Pull in the linker scripts exported by esp-hal's build script.
    "-C", "link-arg=-Tlinkall.x",
    # Force frame pointers so esp-backtrace can unwind panics.
    "-C", "force-frame-pointers",
]

[unstable]
# esp-hal / esp-wifi build core+alloc from source for the exact target.
build-std = ["core", "alloc"]

[registries.crates-io]
protocol = "sparse"

# #140 RX-buffer tuning (heap-gated — see scratch/smol-ha-batt/140-heap-audit.md).
# We ran the stock-low defaults (rx_queue 5 / static_rx 10 / dynamic_rx 32 / rx_ba_win 6),
# which starve sustained RX and were a co-cause of the mid-body OTA-fetch stalls (nebula finding 3 /
# esp-hosted #184). The bump is UNLOCKED by growing the heap 72→128 KiB (net::init_heap) — the audit
# showed ~120 KB of DRAM free and only ~5.9 KB heap headroom at the old size, so tuning buffers on the
# 72 KiB heap would OOM. Each static RX buffer ≈ 1.6 KB, allocated at radio init from the esp-alloc heap.
# HW-GATE-HELD: throughput/stability win only provable on the deaf-list/fetch rig (pairs with #143).
#
# #233: esp-radio 0.18 moved ALL of these RX knobs out of build-env into the runtime
# `ControllerConfig` — static_rx 16 / dynamic_rx 40 / rx_queue 8 / rx_ba_win 12 are now applied
# in net::radio_controller_config() (threaded into wifi::new). esp-config HARD-ERRORS on unknown
# ESP_RADIO_CONFIG_* env keys, and RX_QUEUE_SIZE is no longer one, so there is no [env] block.
