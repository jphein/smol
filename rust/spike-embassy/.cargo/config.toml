# Build config for the ESP32-C3 (RISC-V RV32IMC) Embassy spike. Mirrors rust/clock's
# target/link setup (esp-hal linker scripts via build-std) — the spike is the SAME chip,
# just async. HW-HELD: the `runner` is never actually invoked in this spike (no flashing).

[build]
target = "riscv32imc-unknown-none-elf"

# Host target (build scripts + proc-macros). Real GCC as the host linker driver.
[target.x86_64-unknown-linux-gnu]
linker = "gcc"

[target.riscv32imc-unknown-none-elf]
# Single-app image (no OTA A/B table — the spike is not OTA-capable). NEVER run here.
runner = "espflash flash --monitor"
linker = "rust-lld"
rustflags = [
    "-C", "linker-flavor=ld.lld",
    "-C", "link-arg=-Tlinkall.x",
    "-C", "force-frame-pointers",
]

[unstable]
# esp-hal / esp-wifi build core+alloc from source for the exact target.
build-std = ["core", "alloc"]
