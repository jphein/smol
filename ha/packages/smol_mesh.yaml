    description: >-
      On the id7 OTA-Install button, publish RETAINED smol/7/ota/install = INSTALL.
      RETAINED because the fw does a retained-read on connect (wifi.rs:336/:822) — a bursty
      node (~2s/burst) misses a non-retained publish. The fw self-clears the retained install
      after acting (no re-trigger). The native Update entity stays the "update available"
      indicator; this is the working install trigger until fw discovery adds retain:true (#33 follow-up).
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_ota_install_7
    condition:
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state != 'unavailable' }}"
