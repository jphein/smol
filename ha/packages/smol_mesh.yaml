    condition:
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/{{ trigger.entity_id.split('.')[1].split('_')[1] }}/config/broker"
          retain: true
          qos: 1
          payload: "{{ trigger.to_state.state }}"

  # =====================================================================
  # #100 Stage 3 OTA-host override — per-node input_text → RETAINED smol/<id>/config/ota_host (qos 1).
  # Value = one extra RFC1918 image host (empty = clear → slot default). Applied WITHOUT a reboot;
  # the board RFC1918-validates. RETAINED so the gateway relays to leaves.
  # =====================================================================
  - id: smol_ota_host_publish
    alias: "smol #100: publish per-node OTA-host override"
    description: >-
      On any per-node OTA-host input_text changing, publish retained smol/<id>/config/ota_host (raw).
    mode: parallel
    max: 10
    trigger:
      - platform: state
        entity_id:
          - input_text.smol_7_ota_host
          - input_text.smol_8_ota_host
          - input_text.smol_9_ota_host
    condition:
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/{{ trigger.entity_id.split('.')[1].split('_')[1] }}/config/ota_host"
          retain: true
          qos: 1
          payload: "{{ trigger.to_state.state }}"

  # =====================================================================
  # #52 remote REBOOT — per-node button → TRANSIENT smol/<id>/cmd/reset (retain:FALSE).
  # ⚠️ HARD SAFETY: the reset command is NEVER retained — a retained reset = reboot-loop /
  # soft-brick (same discipline as OTA-install). cmd/ = transient commands; config/ = retained.
  # =====================================================================
  - id: smol_reboot_publish
    alias: "smol #52: per-node remote reboot (transient)"
    description: >-
      On a per-node reboot button, publish TRANSIENT (retain:false) smol/<id>/cmd/reset =
      RESET. HARD SAFETY: never retained — a retained reset would reboot-loop the node.
    mode: parallel
    max: 10
    trigger:
      - platform: state
        entity_id:
          - input_button.smol_7_reboot
          - input_button.smol_8_reboot
          - input_button.smol_9_reboot
    condition:
      # Button guard: allow 'unknown' (a button's pre-first-press state) so the FIRST press
      # fires; `from_state is not none` still blocks the None->unknown startup event.
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state != 'unavailable' }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/{{ trigger.entity_id.split('.')[1].split('_')[1] }}/cmd/reset"
          retain: false
          qos: 1     # #52 transient cmd — qos:1 REQUIRED: the gateway drops qos:0 (~5% loss →
          # unreliable reboot). retain:false stays (a retained reset = reboot-loop); qos:1 gives
          # at-least-once delivery of the momentary RESET. (Retained config topics tolerate qos:0
          # via reconnect-redelivery; only TRANSIENT cmd/ needs qos:1 — canary finding 2026-07-12.)
          payload: "RESET"

  - id: smol_all_reboot_fanout
    alias: "smol #52: reboot-all → per-node reboot buttons"
    description: >-
      On the ALL reboot button, fan out to every per-node reboot button (each then publishes
      its TRANSIENT smol/<id>/cmd/reset). Reboots the whole fleet — deliberate + recoverable.
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_all_reboot
    condition:
      # Button guard: allow 'unknown' (first-press state); block only the None->unknown startup.
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state != 'unavailable' }}"
    action:
      - service: input_button.press
        target:
          entity_id:
            - input_button.smol_7_reboot
            - input_button.smol_8_reboot
            - input_button.smol_9_reboot

