    initial: ""
  smol_9_broker:
    name: "smol 9 broker override (ip[:port])"
    max: 21
    initial: ""
  smol_7_ota_host:
    name: "smol 7 OTA host override (ip)"
    max: 15
    initial: ""
  smol_8_ota_host:
    name: "smol 8 OTA host override (ip)"
    max: 15
    initial: ""
  smol_9_ota_host:
    name: "smol 9 OTA host override (ip)"
    max: 15
    initial: ""

