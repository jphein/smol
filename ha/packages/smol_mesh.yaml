# =====================================================================
# MESH TOPOLOGY derived sensors (issue #27) — HELD; back the topology card.
# rssi = each spoke's signal as heard by the ELECTED owner (dynamic — reads the
# owner's peers list, defaults id7). online = the node's STAT is fresh — reads
# sensor.smol_<id>_screen (the cache-republished smol/<id>/status, reliable single-frame),
# NOT the sparse relay-fragmented telemetry voltage that FALSE-offlined a live-but-sparse
# leaf (#68). F6 (net/wifi.rs:1656) freshness-gates the gateway leaf-status republish at 45s
# → a genuinely-dead node stops refreshing → _screen expire_after (90s) fires → online off;
# an alive leaf keeps re-arming it. (Corrects the earlier #12 note that mis-credited F6 to the
# telemetry path — F6 gates STATUS, which is exactly why online now reads it.)
# resync = a leaf's self-reported ch != the elected channel.
# reelecting = the elected owner is offline or the MC record went stale.
# =====================================================================
template:
  - sensor:
      # --- #45 Custom-screen COMPOSE: turn each node's author string into the wire
      # payload <count>|<size><align>text;… . A TEMPLATE sensor (not a static automation)
      # so it auto-subscribes to whatever {entity_id}s the user references — the clean fix
      # for #45's "trigger on each referenced entity" (a static trigger list can't know
      # them). Reuses the Batt display-override subst() macro; strips ';', clips per size
      # (7 for l, 12 for s/m). Empty author → '' (clears the custom). The publish
      # automation ships this on change. ---
      - name: "smol 7 custom lay"
        unique_id: smol_7_custom_lay
        state: >-
          {%- macro subst(src) -%}
          {%- set ns = namespace(out=src) -%}
          {%- for id in src | regex_findall('\{([a-z0-9_.]+)\}') -%}
          {%- set v = states(id) -%}
          {%- set v = '--' if (v | lower) in ['unknown','unavailable','none',''] else v -%}
          {%- set ns.out = ns.out | replace('{' ~ id ~ '}', v) -%}
          {%- endfor -%}{{- ns.out -}}
          {%- endmacro -%}
          {%- set author = states('input_text.smol_7_custom') -%}
          {%- if (author | lower) in ['unknown','unavailable','none',''] -%}{{- '' -}}
          {%- else -%}
          {%- set ns = namespace(segs=[]) -%}
          {%- for raw in author.split('|')[:4] -%}
          {%- set ln = raw.strip() -%}
          {%- if ln | length >= 2 -%}
          {%- set size = ln[0] if ln[0] in 'sml' else 's' -%}
          {%- set align = ln[1] if ln[1] in 'lcr' else 'l' -%}
          {%- set text = (subst(ln[2:] | trim) | replace(';','')) -%}
          {%- set ns.segs = ns.segs + [size ~ align ~ text[:(7 if size == 'l' else 12)]] -%}
          {%- endif -%}
          {%- endfor -%}
          {%- if ns.segs | length > 0 -%}{{- ns.segs | length -}}|{{- ns.segs | join(';') -}}{%- else -%}{{- '' -}}{%- endif -%}
          {%- endif -%}
      - name: "smol 8 custom lay"
        unique_id: smol_8_custom_lay
        state: >-
          {%- macro subst(src) -%}
          {%- set ns = namespace(out=src) -%}
          {%- for id in src | regex_findall('\{([a-z0-9_.]+)\}') -%}
          {%- set v = states(id) -%}
          {%- set v = '--' if (v | lower) in ['unknown','unavailable','none',''] else v -%}
          {%- set ns.out = ns.out | replace('{' ~ id ~ '}', v) -%}
          {%- endfor -%}{{- ns.out -}}
          {%- endmacro -%}
          {%- set author = states('input_text.smol_8_custom') -%}
          {%- if (author | lower) in ['unknown','unavailable','none',''] -%}{{- '' -}}
          {%- else -%}
          {%- set ns = namespace(segs=[]) -%}
          {%- for raw in author.split('|')[:4] -%}
          {%- set ln = raw.strip() -%}
          {%- if ln | length >= 2 -%}
          {%- set size = ln[0] if ln[0] in 'sml' else 's' -%}
          {%- set align = ln[1] if ln[1] in 'lcr' else 'l' -%}
          {%- set text = (subst(ln[2:] | trim) | replace(';','')) -%}
          {%- set ns.segs = ns.segs + [size ~ align ~ text[:(7 if size == 'l' else 12)]] -%}
          {%- endif -%}
          {%- endfor -%}
          {%- if ns.segs | length > 0 -%}{{- ns.segs | length -}}|{{- ns.segs | join(';') -}}{%- else -%}{{- '' -}}{%- endif -%}
          {%- endif -%}
      - name: "smol 9 custom lay"
        unique_id: smol_9_custom_lay
        state: >-
          {%- macro subst(src) -%}
          {%- set ns = namespace(out=src) -%}
          {%- for id in src | regex_findall('\{([a-z0-9_.]+)\}') -%}
          {%- set v = states(id) -%}
          {%- set v = '--' if (v | lower) in ['unknown','unavailable','none',''] else v -%}
          {%- set ns.out = ns.out | replace('{' ~ id ~ '}', v) -%}
          {%- endfor -%}{{- ns.out -}}
          {%- endmacro -%}
          {%- set author = states('input_text.smol_9_custom') -%}
          {%- if (author | lower) in ['unknown','unavailable','none',''] -%}{{- '' -}}
          {%- else -%}
          {%- set ns = namespace(segs=[]) -%}
          {%- for raw in author.split('|')[:4] -%}
          {%- set ln = raw.strip() -%}
          {%- if ln | length >= 2 -%}
          {%- set size = ln[0] if ln[0] in 'sml' else 's' -%}
          {%- set align = ln[1] if ln[1] in 'lcr' else 'l' -%}
          {%- set text = (subst(ln[2:] | trim) | replace(';','')) -%}
          {%- set ns.segs = ns.segs + [size ~ align ~ text[:(7 if size == 'l' else 12)]] -%}
          {%- endif -%}
          {%- endfor -%}
          {%- if ns.segs | length > 0 -%}{{- ns.segs | length -}}|{{- ns.segs | join(';') -}}{%- else -%}{{- '' -}}{%- endif -%}
          {%- endif -%}
  - sensor:
      # --- #51 dynamic-role gap fix: EVERY node needs leaf-bond entities (any node can be a leaf now).
      # id7 was gateway-only, so its rssi/band/resync were never defined; #51 (id8 can take over) makes
      # id7 a leaf → its dashboard box showed 'entity not found' ×3. Defined for id7 here, mirroring 8/9;
      # they read the DYNAMIC elected owner's peers (sensor.smol_<owner>_peers → the '7,' entry). ---
      - name: "smol 7 rssi"
        unique_id: smol_7_rssi
        state: >-
          {% set owner = state_attr('sensor.smol_mesh_channel', 'owner') or '7' %}
          {% set ps = state_attr('sensor.smol_' ~ owner ~ '_peers', 'peers') or [] %}
          {% set m = ps | select('match', '^7,') | list %}
          {% if m %}{% set v = m[0].split(',')[1] | int(-999) %}{{ v - 256 if v > 127 else v }}{% else %}unknown{% endif %}
      - name: "smol 8 rssi"
        unique_id: smol_8_rssi
        state: >-
          {% set owner = state_attr('sensor.smol_mesh_channel', 'owner') or '7' %}
          {% set ps = state_attr('sensor.smol_' ~ owner ~ '_peers', 'peers') or [] %}
          {% set m = ps | select('match', '^8,') | list %}
          {% if m %}{% set v = m[0].split(',')[1] | int(-999) %}{{ v - 256 if v > 127 else v }}{% else %}unknown{% endif %}
      - name: "smol 9 rssi"
        unique_id: smol_9_rssi
        state: >-
          {% set owner = state_attr('sensor.smol_mesh_channel', 'owner') or '7' %}
          {% set ps = state_attr('sensor.smol_' ~ owner ~ '_peers', 'peers') or [] %}
          {% set m = ps | select('match', '^9,') | list %}
          {% if m %}{% set v = m[0].split(',')[1] | int(-999) %}{{ v - 256 if v > 127 else v }}{% else %}unknown{% endif %}
  - binary_sensor:
      - name: "smol 7 online"
        unique_id: smol_7_online
        state: "{{ states('sensor.smol_7_screen') not in ['unavailable', 'unknown', 'none', ''] }}"
      - name: "smol 8 online"
        unique_id: smol_8_online
        state: "{{ states('sensor.smol_8_screen') not in ['unavailable', 'unknown', 'none', ''] }}"
      - name: "smol 9 online"
        unique_id: smol_9_online
        state: "{{ states('sensor.smol_9_screen') not in ['unavailable', 'unknown', 'none', ''] }}"
      - name: "smol 7 resync"
        unique_id: smol_7_resync
        state: >-
          {% set ch = state_attr('sensor.smol_7_peers', 'ch') %}
          {{ ch is not none and ch != state_attr('sensor.smol_mesh_channel', 'channel') }}
      - name: "smol 8 resync"
        unique_id: smol_8_resync
        state: >-
          {% set ch = state_attr('sensor.smol_8_peers', 'ch') %}
          {{ ch is not none and ch != state_attr('sensor.smol_mesh_channel', 'channel') }}
      - name: "smol 9 resync"
        unique_id: smol_9_resync
        state: >-
