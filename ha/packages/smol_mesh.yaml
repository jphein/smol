# smol mesh ↔ Home Assistant — MQTT-native downlink (team spec v2, 2026-07-08)
# ---------------------------------------------------------------------------
# This package is the HA end of the smol battery-display bridge. It publishes a
# RETAINED, display-ready payload to the MQTT topic `smol/display/batt` every
# time a source battery sensor changes, on a 5-minute heartbeat, and when HA
# starts. Because the message is retained, the broker itself is the cache: a smol
# gateway connects for only ~2 s during its WiFi burst, SUBSCRIBEs, and the
# broker delivers the last value immediately — no HA-side request/response. The
# gateway then rebroadcasts it over ESP-NOW (a SMOLv1 BATT frame) so every leaf
# node caches it too.
#
# Payload format (LOCKED — the exact lines the firmware renders on the 72×40 OLED):
#   BATT|48V 52.8V|HV 391.9V|d 43mV|48V 69%|HV 99%|Chg 4.1A
#   - pipe-separated, ≤6 segments, each ≤12 chars, whole payload ≤96 bytes, ASCII
#     (verified worst case ≈62 B). Segments 1-3 = the VOLTAGE overview page (title
#     `Batt`); segments 4-6 = the SOC/charge DETAIL segments (issue #17). A short tap
#     on the board pages through them; boards flashed before #17 `split('|').take(3)`
#     so they ignore 4-6 and keep showing the voltage page — FULLY backward-compatible.
#   ⚠️ BIG-RENDER CONTRACT (co-designed with the firmware, 2026-07-08): the firmware
#     renders each DETAIL segment (4-6) as its own full-window page = a small LABEL
#     (text before the FIRST space) + a BIG value (everything after). So each detail
#     segment MUST be `<shortlabel> <value>` with NO interior space before the value
#     (`48V 69%` -> label "48V", value "69%"). Keep labels single-token.
#   VOLTAGE overview page (segments 1-3, unchanged):
#   - seg 1: 48V bank    %.1f V   sensor.48v_battery1_voltage  (BMS-direct; see below)
#            fallback           → sensor.48v_battery2_voltage, else `--`
#   - seg 2: BMW i3 HV pack %.1f V   sensor.be_battery_voltage
#   - seg 3: i3 cell spread %.0f mV  sensor.be_cell_voltage_delta
#   DETAIL segments (4-6, issue #17 — each a big full-window page on the board):
#   - seg 4 `48V`: 48V bank SOC  %.0f %  sensor.48v_battery1_battery  (BMS, coulomb-
#            counted — the same source we trust for the voltage line), fallback
#            sensor.48v_battery2_battery. (Team ruling 2026-07-08: moved OFF EPEver —
#            EPEver's SOC is a crude voltage estimate and its bus flaps `unavailable`;
#            the BMS is authoritative and keeps the SOC page off the flaky EPEver path.)
#   - seg 5 `HV`: HV pack SOC   %.0f %  sensor.be_soc, fallback sensor.battery_state_of_charge
#   - seg 6 `Chg`: charge current %.1f A sensor.epever_charging_current (TOTAL solar
#            charge into the 48V bank), else `--`. (Kept on EPEver, not a BMS current:
#            the per-battery BMS currents are half-the-bank each and can't be summed in
#            the macro; EPEver gives the true total bank charge current.)
#   - any source that is unavailable / unknown / STALE renders `--` for that segment
#     (e.g. `BATT|48V --|HV 391.9V|d 43mV|48V 69%|HV 99%|Chg --`). See STALENESS below
#     — the HV SOC (seg 5) window is wider than the others on purpose.
#
# OVERRIDE MODE: when input_boolean.smol_display_override is ON, the automation
# publishes `BATT|<line1>|<line2>|<line3>|A ..|B ..|C ..` — the three line SOURCES
# (input_text.smol_display_line1/2/3) own segments 1-3 instead of the battery
# voltages, but the SOC trio (segments 4-6) is STILL appended (issue #17 spec), so
# a board can short-tap to the live SOC page even mid-override. SAME topic +
# envelope, so the boards need ZERO changes.
#   - A source is literal text with `{entity_id}` placeholders, e.g.
#     `48V {sensor.48v_battery1_voltage}V` -> `48V 52.8V`, `PV {sensor.epever_pv_power}W`.
#   - Placeholders are resolved by SAFE regex substitution (regex_findall on
#     `\{([a-z0-9_.]+)\}`, each `{id}` -> `states('<id>')`). We do NOT eval
#     user-typed Jinja (HA's sandbox forbids it and it would be an injection risk).
#     A placeholder whose entity is unknown/unavailable renders `--`.
#   - AFTER substitution each line is SANITIZED: `|` chars stripped (they'd corrupt
#     the pipe framing) and the line clipped to 12 chars (payload stays ≤96 B).
#     Blank lines render empty (fine on-glass). Toggle OFF -> live battery reading.
#   - REFRESH: placeholder values re-render on the 5-min time_pattern (referenced
#     entities are NOT dynamic triggers), plus on any override-helper edit and HA
#     start. So a value inside a placeholder can be up to ~5 min stale.
#
# DASHBOARD: `mqtt.sensor.smol_display_batt` mirrors the retained topic so a
# Lovelace card shows exactly what the boards will fetch. Ready-made card:
# ha/dashboard/smol_display_card.yaml (install via the WS lovelace/config/save
# API at deploy time — NOT by editing .storage; see ha/README.md).
#
# WHY NOT sensor.epever_battery_voltage for the 48V line? JP's HA history
# (2026-07-08) shows that entity is chronically corrupted — it bounces 0↔55 V with
# >100 V spikes all day (suspected Modbus/PE11 bus contention; under separate
# investigation). The BMS-direct `sensor.48v_battery1_voltage` (~52.8, stable) is
# the truth source; `sensor.48v_battery2_voltage` is the fallback. The epever
# entity is deliberately AVOIDED here.
#
# STALENESS: the automation also fires every 5 min (time_pattern) and the template
# renders `--` for any source whose `last_reported` is older than its per-segment
# window, so a wedged integration cannot freeze a stale-but-live-looking value into
# the retained payload. `last_reported` (not `last_updated`) is used deliberately:
# it advances on EVERY state write, so a live integration that keeps re-reporting an
# unchanged value stays "fresh", while a truly wedged one goes stale. (Confirmed
# live 2026-07-08: sensor.48v_battery1_battery re-reports every ~25 s at a steady
# 69% — last_reported 25 s, last_updated 46 min — so `last_reported` correctly
# treats it as fresh.)
#   - VOLTAGE segments + 48V BMS SOC + EPEver charge current: 30 min (1800 s), the
#     `cell()` default. The 30-min window (team ruling 2026-07-08) covers the measured
#     worst case: the BE HV/delta sensors publish on-change and a steady pack
#     legitimately goes quiet up to ~22.6 min, so a tighter window would blank HEALTHY
#     data and train the reader to ignore `--`. Keeping the EPEver charge current (s3)
#     at 30 min ALSO makes it a health signal for the PE11 bus — it blanks fast if the
#     bus wedges again.
#   - HV pack SOC (segment 5, sensor.be_soc): 6 h (21600 s). SOC at rest changes
#     glacially, so this on-change MQTT source legitimately goes silent for tens of
#     minutes to hours (measured 50 min silent at a steady 99% on 2026-07-08). A
#     30-min window would blank a perfectly valid SOC almost the whole time the pack
#     is at rest, gutting the SOC page. 6 h shows the real value yet still catches a
#     truly dead Battery-Emulator. Each window is a per-call `maxage` arg on `cell()`.
# KNOWN LIMITATION (see ha/README.md): if HA ITSELF dies, the retained payload
# persists on the broker and the boards cannot tell it is stale (they show it with
# their own fetch-age only). A payload-embedded timestamp is a filed follow-up.
#
# Deploy: copy to /homeassistant/packages/smol_mesh.yaml and restart HA. See
# ha/README.md. This file only PUBLISHES; the uplink entities (sensor.smol_<id>_*)
# are created automatically by the firmware's retained MQTT-discovery configs.

# --- Manual display-override helpers ---------------------------------------
# Three free-text lines + a master toggle. When the toggle is ON the automation
# publishes these (sanitized) instead of the battery reading.
input_text:
  # Line SOURCES (not the final text): literal chars + {entity_id} placeholders,
  # e.g. "48V {sensor.48v_battery1_voltage}V" or "PV {sensor.epever_pv_power}W".
  # max 100 to fit source + placeholders; the RENDERED line is clipped to 12.
  smol_display_line1:
    name: "smol display line 1 (source)"
    max: 100
    initial: ""
  smol_display_line2:
    name: "smol display line 2 (source)"
    max: 100
    initial: ""
  smol_display_line3:
    name: "smol display line 3 (source)"
    max: 100
    initial: ""

input_boolean:
  smol_display_override:
    name: "smol display override"
    icon: "mdi:pencil"

# =====================================================================
# NODE MANAGER (issue #21) — remotely set each node's DEFAULT SCREEN + page
# via retained  smol/<id>/config/default_screen = <AppKind>:<page>.
# Protocol LOCKED per nodemgr-design.md §2. This is the HA PUBLISH/GUI half;
# the firmware CONSUME side (subscribe + panic-free parse) is a later wave.
#   - AppKind tokens = EXACT app.rs spellings (case-sensitive), full espnow set.
#     Firmware ignores/clamps any token it can't build in its tier (never crashes).
#   - page: flat "0"/"1" (only Batt has 2 pages today; firmware clamps invalid -> 0).
#   - "Apply"  -> publishes the retained value (broker = persistence).
#   - "Reset"  -> publishes an EMPTY retained payload = clear -> node falls back to
#                 its board.rs DEFAULT_APP/DEFAULT_PAGE (design §2.5, R-P1 lifecycle).
#   - "Set all" -> fans out to EVERY per-node topic (NO broadcast topic — ruling #3).
#   - Closed-set input_select => HA can never emit a malformed payload (security §7);
#     the firmware still parses panic-free because the broker is LAN-writable.
# NOTE (honest, per design): credential-less leaves never open MQTT, so they use
# their board.rs default until given creds (reach = JP decision F2). The OTA panel,
# mesh-topology view, and LIVE current-screen preview are DEFERRED (JP-decisions
# F5/F6/F7 + firmware smol/<id>/status F4); v1 reflects COMMANDED config only.
# =====================================================================
input_select:
  # --- set-all (writes every per-node topic) ---
  smol_all_screen:
    name: "smol all · default screen"
    options: [Menu, Clock, Batt, Grid, Snake, Bench, MeshSnake, About]
    initial: Menu
    icon: mdi:monitor-multiple
  smol_all_page:
    name: "smol all · default page"
    options: ["0", "1"]
    initial: "0"
    icon: mdi:book-open-page-variant
  # --- id7 (one copy-paste block per node; new node = duplicate + renumber) ---
  smol_7_screen:
    name: "smol id7 · default screen"
    options: [Menu, Clock, Batt, Grid, Snake, Bench, MeshSnake, About]
    initial: Menu
    icon: mdi:monitor
  smol_7_page:
    name: "smol id7 · default page"
    options: ["0", "1"]
    initial: "0"
    icon: mdi:book-open-page-variant
  # --- id8 ---
  smol_8_screen:
    name: "smol id8 · default screen"
    options: [Menu, Clock, Batt, Grid, Snake, Bench, MeshSnake, About]
    initial: Menu
    icon: mdi:monitor
  smol_8_page:
    name: "smol id8 · default page"
    options: ["0", "1"]
    initial: "0"
    icon: mdi:book-open-page-variant
  # --- id9 ---
  smol_9_screen:
    name: "smol id9 · default screen"
    options: [Menu, Clock, Batt, Grid, Snake, Bench, MeshSnake, About]
    initial: Menu
    icon: mdi:monitor
  smol_9_page:
    name: "smol id9 · default page"
    options: ["0", "1"]
    initial: "0"
    icon: mdi:book-open-page-variant

input_button:
  smol_all_apply:
    name: "smol all · apply"
    icon: mdi:send-check
  smol_7_apply:
    name: "smol id7 · apply"
    icon: mdi:send
  smol_7_reset:
    name: "smol id7 · reset to board default"
    icon: mdi:backup-restore
  smol_8_apply:
    name: "smol id8 · apply"
    icon: mdi:send
  smol_8_reset:
    name: "smol id8 · reset to board default"
    icon: mdi:backup-restore
  smol_9_apply:
    name: "smol id9 · apply"
    icon: mdi:send
  smol_9_reset:
    name: "smol id9 · reset to board default"
    icon: mdi:backup-restore
  # --- OTA panel (issue #6) — CANARY-first, per-id. The "target" is whatever
  #     tools/ota_publish.sh last STAGED (smol/ota/staged); these buttons push that
  #     staged line to a single node's acted topic smol/ota/announce/<id>. Push ONE,
  #     verify its running build advances (needs firmware smol/<id>/status), then the
  #     next. NEVER fleet-unison while bootloader revert is unproven (ROADMAP D2).
  smol_ota_push_7:
    name: "smol OTA · push staged → id7 (canary)"
    icon: mdi:rocket-launch
  smol_ota_push_8:
    name: "smol OTA · push staged → id8"
    icon: mdi:rocket-launch
  smol_ota_push_9:
    name: "smol OTA · push staged → id9"
    icon: mdi:rocket-launch
  smol_ota_rollout:
    name: "smol OTA · roll out to rest (id8+id9, after id7 canary healthy)"
    icon: mdi:rocket-launch-outline
  smol_ota_clear:
    name: "smol OTA · clear all announces (abort)"
    icon: mdi:cancel

# --- Dashboard mirror: subscribe the retained topic so a card shows exactly ---
# what the boards fetch (the payload is <=96 chars, well under the 255 state cap).
mqtt:
  sensor:
    - name: "smol display batt"
      unique_id: smol_display_batt_mirror
      state_topic: "smol/display/batt"
      icon: "mdi:monitor-dashboard"
    - name: "smol display grid"
      unique_id: smol_display_grid_mirror
      state_topic: "smol/display/grid"
      icon: "mdi:transmission-tower"
    # --- node-manager: COMMANDED config mirrors (issue #21) ---
    # Reflect the commanded config (the retained value HA published) so the card
    # shows what was set. LIVE actual screen + running build needs the firmware
    # smol/<id>/status publish (design F4) — deferred; v1 = commanded config only.
    - name: "smol 7 config"
      unique_id: smol_7_config_mirror
      state_topic: "smol/7/config/default_screen"
      icon: "mdi:cog"
    - name: "smol 8 config"
      unique_id: smol_8_config_mirror
      state_topic: "smol/8/config/default_screen"
      icon: "mdi:cog"
    - name: "smol 9 config"
      unique_id: smol_9_config_mirror
      state_topic: "smol/9/config/default_screen"
      icon: "mdi:cog"
    # --- OTA panel (issue #6) ---
    # The STAGED target — set by tools/ota_publish.sh (OTA|build|size|sha256|url).
    # State = the build number; the full fields are attributes the push automations
    # reconstruct the announce line from.
    - name: "smol ota staged"
      unique_id: smol_ota_staged_mirror
      state_topic: "smol/ota/staged"
      value_template: "{{ value.split('|')[1] if value.startswith('OTA|') else 'none' }}"
      json_attributes_topic: "smol/ota/staged"
      json_attributes_template: >-
        {% set p = value.split('|') %}
        {{ {'build': p[1], 'size': p[2], 'sha256': p[3], 'url': p[4]} if (p | length >= 5 and p[0] == 'OTA') else {} }}
      icon: "mdi:package-up"
    # Per-node LIVE status — NEEDS firmware smol/<id>/status = STAT|<screen>:<page>|<build>
    # (design F4; unknown until the firmware wave ships it). Feeds the OTA no-downgrade
    # gate (running build) AND the node-manager live current-screen reflection.
    - name: "smol 7 status"
      unique_id: smol_7_status_mirror
      state_topic: "smol/7/status"
      value_template: "{{ value.split('|')[1] if '|' in value else value }}"
      json_attributes_topic: "smol/7/status"
      json_attributes_template: "{% set p = value.split('|') %}{{ {'build': p[2]} if p | length >= 3 else {} }}"
      icon: "mdi:chip"
    - name: "smol 8 status"
      unique_id: smol_8_status_mirror
      state_topic: "smol/8/status"
      value_template: "{{ value.split('|')[1] if '|' in value else value }}"
      json_attributes_topic: "smol/8/status"
      json_attributes_template: "{% set p = value.split('|') %}{{ {'build': p[2]} if p | length >= 3 else {} }}"
      icon: "mdi:chip"
    - name: "smol 9 status"
      unique_id: smol_9_status_mirror
      state_topic: "smol/9/status"
      value_template: "{{ value.split('|')[1] if '|' in value else value }}"
      json_attributes_topic: "smol/9/status"
      json_attributes_template: "{% set p = value.split('|') %}{{ {'build': p[2]} if p | length >= 3 else {} }}"
      icon: "mdi:chip"
    # --- MESH TOPOLOGY (issue #27) — HELD; needs the firmware peers/channel publish ---
    # NOT YET PUBLISHED BY FIRMWARE. These + the template block below back the topology
    # card (ha/dashboard/smol_topology_card.yaml). Contract (#27, fw morpheus-fw Task 3):
    #   smol/mesh/channel = MC|owner|channel|seq         (the elected gateway + mesh ch)
    #   smol/<id>/peers   = PEERS|role|ch|id,rssi,age,flags|…   (each connected board's roster)
    # Parsing mirrors the batt/grid/config discipline (guarded split, panic-free). Until
    # firmware publishes these, every entity below reads unknown/unavailable (harmless).
    - name: "smol mesh channel"
      unique_id: smol_mesh_channel_mirror
      state_topic: "smol/mesh/channel"
      value_template: "{% set p = value.split('|') %}{{ p[3] if p | length >= 4 else 'unknown' }}"
      json_attributes_topic: "smol/mesh/channel"
      json_attributes_template: "{% set p = value.split('|') %}{{ {'owner': p[1], 'channel': p[2], 'seq': p[3]} if p | length >= 4 else {} }}"
      expire_after: 90
      icon: "mdi:lan"
    - name: "smol 7 peers"
      unique_id: smol_7_peers_mirror
      state_topic: "smol/7/peers"
      value_template: "{% set p = value.split('|') %}{{ 'gateway' if (p | length > 1 and p[1] == 'G') else 'leaf' }}"
      json_attributes_topic: "smol/7/peers"
      json_attributes_template: "{% set p = value.split('|') %}{{ {'ch': p[2], 'peers': p[3:]} if p | length >= 3 else {'peers': []} }}"
      expire_after: 90
      icon: "mdi:lan-connect"
    - name: "smol 8 peers"
      unique_id: smol_8_peers_mirror
      state_topic: "smol/8/peers"
      value_template: "{% set p = value.split('|') %}{{ 'gateway' if (p | length > 1 and p[1] == 'G') else 'leaf' }}"
      json_attributes_topic: "smol/8/peers"
      json_attributes_template: "{% set p = value.split('|') %}{{ {'ch': p[2], 'peers': p[3:]} if p | length >= 3 else {'peers': []} }}"
      expire_after: 90
      icon: "mdi:lan-connect"
    - name: "smol 9 peers"
      unique_id: smol_9_peers_mirror
      state_topic: "smol/9/peers"
      value_template: "{% set p = value.split('|') %}{{ 'gateway' if (p | length > 1 and p[1] == 'G') else 'leaf' }}"
      json_attributes_topic: "smol/9/peers"
      json_attributes_template: "{% set p = value.split('|') %}{{ {'ch': p[2], 'peers': p[3:]} if p | length >= 3 else {'peers': []} }}"
      expire_after: 90
      icon: "mdi:lan-connect"

# =====================================================================
# MESH TOPOLOGY derived sensors (issue #27) — HELD; back the topology card.
# rssi = each spoke's signal as heard by the ELECTED owner (dynamic — reads the
# owner's peers list, defaults id7). online = the telemetry entity is present
# (⚠️ those discovery entities currently lack expire_after — a silently-dead node
# won't auto-flip offline until #12 sets it; the doubled entity names are also
# #12-cleanup-fragile). resync = a leaf's self-reported ch != the elected channel.
# reelecting = the elected owner is offline or the MC record went stale.
# =====================================================================
template:
  - sensor:
      - name: "smol 8 rssi"
        unique_id: smol_8_rssi
        state: >-
          {% set owner = state_attr('sensor.smol_mesh_channel', 'owner') or '7' %}
          {% set ps = state_attr('sensor.smol_' ~ owner ~ '_peers', 'peers') or [] %}
          {% set m = ps | select('match', '^8,') | list %}
          {{ m[0].split(',')[1] if m else 'unknown' }}
      - name: "smol 9 rssi"
        unique_id: smol_9_rssi
        state: >-
          {% set owner = state_attr('sensor.smol_mesh_channel', 'owner') or '7' %}
          {% set ps = state_attr('sensor.smol_' ~ owner ~ '_peers', 'peers') or [] %}
          {% set m = ps | select('match', '^9,') | list %}
          {{ m[0].split(',')[1] if m else 'unknown' }}
  - binary_sensor:
      - name: "smol 7 online"
        unique_id: smol_7_online
        state: "{{ states('sensor.smol_7_dominion_smol_7') not in ['unavailable', 'unknown', 'none', ''] }}"
      - name: "smol 8 online"
        unique_id: smol_8_online
        state: "{{ states('sensor.smol_8_nexus_smol_8') not in ['unavailable', 'unknown', 'none', ''] }}"
      - name: "smol 9 online"
        unique_id: smol_9_online
        state: "{{ states('sensor.smol_9_herald_smol_9') not in ['unavailable', 'unknown', 'none', ''] }}"
      - name: "smol 8 resync"
        unique_id: smol_8_resync
        state: >-
          {% set ch = state_attr('sensor.smol_8_peers', 'ch') %}
          {{ ch is not none and ch != state_attr('sensor.smol_mesh_channel', 'channel') }}
      - name: "smol 9 resync"
        unique_id: smol_9_resync
        state: >-
          {% set ch = state_attr('sensor.smol_9_peers', 'ch') %}
          {{ ch is not none and ch != state_attr('sensor.smol_mesh_channel', 'channel') }}
      - name: "smol mesh reelecting"
        unique_id: smol_mesh_reelecting
        state: >-
          {% set owner = state_attr('sensor.smol_mesh_channel', 'owner') or '7' %}
          {{ is_state('binary_sensor.smol_' ~ owner ~ '_online', 'off')
             or states('sensor.smol_mesh_channel') in ['unavailable', 'unknown'] }}

automation:
  - id: smol_publish_batt_display
    alias: "smol: publish battery display payload (retained)"
    description: >-
      Publishes the display-ready payload to smol/display/batt (retained, QoS0):
      6 segments `BATT|v1|v2|v3|s1|s2|s3` — the voltage trio (1-3) is the manual
      override text when input_boolean.smol_display_override is ON, otherwise the
      live battery voltages; the SOC trio (4-6, issue #17) is always appended.
      Fires on any source-sensor change, any override-helper change, every 5
      minutes, and at HA start. Stale (voltage/EPEver >30 min, HV SOC >6 h) or
      unavailable sources render as `--` per segment.
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        id: sensor_change
        entity_id:
          - sensor.48v_battery1_voltage
          - sensor.48v_battery2_voltage
          - sensor.be_battery_voltage
          - sensor.be_cell_voltage_delta
          # SOC page (issue #17, segments 4-6). 48V SOC = the BMS (coulomb-counted,
          # same source we trust for the voltage line) — decoupled from the flaky
          # EPEver bus per team ruling 2026-07-08. Charge current (s3, still EPEver)
          # rides the 5-min heartbeat instead of triggering, to avoid churn.
          - sensor.48v_battery1_battery
          - sensor.48v_battery2_battery
          - sensor.be_soc
          - sensor.battery_state_of_charge
      - platform: state
        id: override_change
        entity_id:
          - input_boolean.smol_display_override
          - input_text.smol_display_line1
          - input_text.smol_display_line2
          - input_text.smol_display_line3
      - platform: time_pattern
        id: heartbeat
        minutes: "/5"
      - platform: homeassistant
        event: start
        id: ha_start
    action:
      - service: mqtt.publish
        data:
          topic: smol/display/batt
          retain: true
          qos: 0
          # `>-` folds the block to one line; the {%- -%} trims + per-cell |trim
          # make the rendered output EXACTLY the `BATT|...` line, no stray space.
          # The SOC trio (s1/s2/s3) is computed ONCE and appended in both branches
          # so the SOC page is available even mid-override (issue #17).
          # Override ON -> `subst()` resolves {entity_id} placeholders in each line
          # source (unknown -> `--`), then `|` is stripped and the line clipped to
          # 12; OFF -> the live battery voltages. The `cell(label, entities, fmt,
          # maxage)` macro picks the first available source from its fallback list
          # whose `last_reported` is within `maxage` (default 1800 s; HV SOC 21600 s).
          payload: >-
            {%- macro cell(label, entities, fmt, maxage=1800) -%}
            {%- set ns = namespace(out=label ~ ' --', found=false) -%}
            {%- for ent in entities -%}
            {%- if not ns.found -%}
            {%- set s = states[ent] -%}
            {%- if s is not none and (s.state | lower) not in ['unknown', 'unavailable', 'none', ''] and (now() - s.last_reported).total_seconds() <= maxage -%}
            {%- set ns.out = label ~ ' ' ~ (fmt | format(s.state | float)) -%}
            {%- set ns.found = true -%}
            {%- endif -%}
            {%- endif -%}
            {%- endfor -%}
            {{- ns.out -}}
            {%- endmacro -%}
            {%- macro subst(src) -%}
            {%- set ns = namespace(out=src) -%}
            {%- for id in src | regex_findall('\{([a-z0-9_.]+)\}') -%}
            {%- set v = states(id) -%}
            {%- set v = '--' if (v | lower) in ['unknown', 'unavailable', 'none', ''] else v -%}
            {%- set ns.out = ns.out | replace('{' ~ id ~ '}', v) -%}
            {%- endfor -%}
            {{- ns.out -}}
            {%- endmacro -%}
            {%- set s1 = cell('48V', ['sensor.48v_battery1_battery', 'sensor.48v_battery2_battery'], '%.0f%%') | trim -%}
            {%- set s2 = cell('HV', ['sensor.be_soc', 'sensor.battery_state_of_charge'], '%.0f%%', 21600) | trim -%}
            {%- set s3 = cell('Chg', ['sensor.epever_charging_current'], '%.1fA') | trim -%}
            {%- if is_state('input_boolean.smol_display_override', 'on') -%}
            {%- set bad = ['unknown', 'unavailable', 'none', ''] -%}
            {%- set o1 = states('input_text.smol_display_line1') -%}
            {%- set o2 = states('input_text.smol_display_line2') -%}
            {%- set o3 = states('input_text.smol_display_line3') -%}
            {%- set l1 = '' if (o1 | lower) in bad else (subst(o1) | replace('|', ''))[:12] -%}
            {%- set l2 = '' if (o2 | lower) in bad else (subst(o2) | replace('|', ''))[:12] -%}
            {%- set l3 = '' if (o3 | lower) in bad else (subst(o3) | replace('|', ''))[:12] -%}
            BATT|{{ l1 }}|{{ l2 }}|{{ l3 }}|{{ s1 }}|{{ s2 }}|{{ s3 }}
            {%- else -%}
            BATT|{{ cell('48V', ['sensor.48v_battery1_voltage', 'sensor.48v_battery2_voltage'], '%.1fV') | trim }}|{{ cell('HV', ['sensor.be_battery_voltage'], '%.1fV') | trim }}|{{ cell('d', ['sensor.be_cell_voltage_delta'], '%.0fmV') | trim }}|{{ s1 }}|{{ s2 }}|{{ s3 }}
            {%- endif -%}

  # --- GRID display (issue #16, v2.2 EXTENSION) -----------------------------
  # A SECOND retained payload for the grid/consumption page the boards page to,
  # separate from the batt payload (own topic, own automation, own triggers):
  #   GRID|1118W|L1 150W|L2 970W
  #   - line 1 (no label): TOTAL = sensor.yurt_consumption — the "yurt consumption"
  #     sensor JP watches on his dashboard (a calculated sum over the two PJ2101A
  #     clamps). It reports in kW, so it is scaled ×1000 to WATTS for unit
  #     consistency with the legs. (sensor.total_grid_power is the same value already
  #     in W, but JP watches "yurt consumption", so that is the source of truth.)
  #   - line 2 `L1`: sensor.l1_power_clamp (W) · line 3 `L2`: sensor.l2_power_clamp (W)
  #   - same envelope as batt: ≤96 B, ≤12 ch/line, ASCII; per-line `--` on
  #     unavailable/unknown/STALE (>30 min last_reported). A value that would exceed
  #     5 digits of watts switches THAT line to `X.XXkW` (safety valve; a yurt won't).
  # Kept as its own automation (not a shared macro with batt) because power lines
  # need kW/W scaling + an empty-label total that the batt `cell()` macro doesn't —
  # two focused automations read cleaner than one merged one, and this leaves the
  # already-live batt publish untouched.
  - id: smol_publish_grid_display
    alias: "smol: publish grid display payload (retained)"
    description: >-
      Publishes the grid/consumption payload to smol/display/grid (retained, QoS0):
      GRID|<total>|L1 <l1>W|L2 <l2>W. Total = the "yurt consumption" sensor (kW,
      scaled to W); legs = the two PJ2101A power clamps (W). Fires on any of the
      three source changes, every 5 minutes, and at HA start. Stale (>30 min) or
      unavailable sources render `--` per line.
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        id: grid_change
        entity_id:
          - sensor.yurt_consumption
          - sensor.l1_power_clamp
          - sensor.l2_power_clamp
      - platform: time_pattern
        id: heartbeat
        minutes: "/5"
      - platform: homeassistant
        event: start
        id: ha_start
    action:
      - service: mqtt.publish
        data:
          topic: smol/display/grid
          retain: true
          qos: 0
          # `pcell(label, entity, scale, maxage)` renders one power segment: an empty
          # label -> bare value (the total line); `scale` converts kW->W (total=1000,
          # legs=1); a magnitude >=100000 W renders `X.XXkW`; unavailable/unknown or
          # last_reported older than `maxage` (30 min) -> `--`.
          payload: >-
            {%- macro pcell(label, entity, scale, maxage=1800) -%}
            {%- set pre = (label ~ ' ') if label else '' -%}
            {%- set s = states[entity] -%}
            {%- if s is not none and (s.state | lower) not in ['unknown', 'unavailable', 'none', ''] and (now() - s.last_reported).total_seconds() <= maxage -%}
            {%- set w = (s.state | float) * scale -%}
            {%- if (w | abs) >= 100000 -%}
            {{- pre ~ ('%.2fkW' | format(w / 1000)) -}}
            {%- else -%}
            {{- pre ~ ('%.0fW' | format(w)) -}}
            {%- endif -%}
            {%- else -%}
            {{- pre ~ '--' -}}
            {%- endif -%}
            {%- endmacro -%}
            GRID|{{ pcell('', 'sensor.yurt_consumption', 1000) | trim }}|{{ pcell('L1', 'sensor.l1_power_clamp', 1) | trim }}|{{ pcell('L2', 'sensor.l2_power_clamp', 1) | trim }}

  # =====================================================================
  # NODE MANAGER automations (issue #21) — publish the retained per-node config.
  # Trigger = the Apply/Reset input_buttons; payload = <AppKind>:<page> from the
  # closed-set input_selects (so it is always a valid token). "Set all" fans out
  # to every per-node topic (no broadcast). Reset publishes empty = clear.
  # =====================================================================
  - id: smol_nodemgr_7_apply
    alias: "smol nodemgr: id7 apply default screen"
    description: >-
      On the id7 Apply button, publish retained smol/7/config/default_screen =
      <AppKind>:<page> from the id7 helpers (broker retention = persistence).
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_7_apply
    action:
      - service: mqtt.publish
        data:
          topic: "smol/7/config/default_screen"
          retain: true
          qos: 0
          payload: "{{ states('input_select.smol_7_screen') }}:{{ states('input_select.smol_7_page') }}"
  - id: smol_nodemgr_7_reset
    alias: "smol nodemgr: id7 reset to board default"
    description: >-
      On the id7 Reset button, publish an EMPTY retained payload (retain-delete) so
      id7 falls back to its board.rs DEFAULT_APP/DEFAULT_PAGE (design §2.5, R-P1).
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_7_reset
    action:
      - service: mqtt.publish
        data:
          topic: "smol/7/config/default_screen"
          retain: true
          qos: 0
          payload: ""
  - id: smol_nodemgr_8_apply
    alias: "smol nodemgr: id8 apply default screen"
    description: >-
      On the id8 Apply button, publish retained smol/8/config/default_screen.
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_8_apply
    action:
      - service: mqtt.publish
        data:
          topic: "smol/8/config/default_screen"
          retain: true
          qos: 0
          payload: "{{ states('input_select.smol_8_screen') }}:{{ states('input_select.smol_8_page') }}"
  - id: smol_nodemgr_8_reset
    alias: "smol nodemgr: id8 reset to board default"
    description: >-
      On the id8 Reset button, publish an EMPTY retained payload (clear).
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_8_reset
    action:
      - service: mqtt.publish
        data:
          topic: "smol/8/config/default_screen"
          retain: true
          qos: 0
          payload: ""
  - id: smol_nodemgr_9_apply
    alias: "smol nodemgr: id9 apply default screen"
    description: >-
      On the id9 Apply button, publish retained smol/9/config/default_screen.
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_9_apply
    action:
      - service: mqtt.publish
        data:
          topic: "smol/9/config/default_screen"
          retain: true
          qos: 0
          payload: "{{ states('input_select.smol_9_screen') }}:{{ states('input_select.smol_9_page') }}"
  - id: smol_nodemgr_9_reset
    alias: "smol nodemgr: id9 reset to board default"
    description: >-
      On the id9 Reset button, publish an EMPTY retained payload (clear).
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_9_reset
    action:
      - service: mqtt.publish
        data:
          topic: "smol/9/config/default_screen"
          retain: true
          qos: 0
          payload: ""
  - id: smol_nodemgr_set_all
    alias: "smol nodemgr: SET ALL default screen"
    description: >-
      On the Apply-to-all button, fan the set-all screen+page out to EVERY per-node
      topic (id7/id8/id9) — no broadcast topic (ruling #3 / design §2.1). Each
      per-node retained value is overwritten.
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_all_apply
    action:
      - service: mqtt.publish
        data:
          topic: "smol/7/config/default_screen"
          retain: true
          qos: 0
          payload: "{{ states('input_select.smol_all_screen') }}:{{ states('input_select.smol_all_page') }}"
      - service: mqtt.publish
        data:
          topic: "smol/8/config/default_screen"
          retain: true
          qos: 0
          payload: "{{ states('input_select.smol_all_screen') }}:{{ states('input_select.smol_all_page') }}"
      - service: mqtt.publish
        data:
          topic: "smol/9/config/default_screen"
          retain: true
          qos: 0
          payload: "{{ states('input_select.smol_all_screen') }}:{{ states('input_select.smol_all_page') }}"

  # =====================================================================
  # OTA panel automations (issue #6) — publish the STAGED announce line
  # (smol/ota/staged, set by tools/ota_publish.sh) to a single node's acted
  # topic smol/ota/announce/<id>. CANARY-first: push one, verify its running
  # build advances (needs firmware smol/<id>/status), then the next. The line is
  # rebuilt from the staged mirror's attributes (build|size|sha256|url).
  # =====================================================================
  - id: smol_ota_push_id7
    alias: "smol OTA: push staged to id7 (canary)"
    description: >-
      On the id7 push button, republish the staged OTA announce to
      smol/ota/announce/7 (only id7 acts). No-op if nothing is staged.
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_ota_push_7
    condition:
      - condition: template
        value_template: "{{ state_attr('sensor.smol_ota_staged', 'build') not in [none, 'none'] }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/ota/announce/7"
          retain: true
          qos: 0
          payload: "OTA|{{ state_attr('sensor.smol_ota_staged','build') }}|{{ state_attr('sensor.smol_ota_staged','size') }}|{{ state_attr('sensor.smol_ota_staged','sha256') }}|{{ state_attr('sensor.smol_ota_staged','url') }}"
  - id: smol_ota_push_id8
    alias: "smol OTA: push staged to id8"
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_ota_push_8
    condition:
      - condition: template
        value_template: "{{ state_attr('sensor.smol_ota_staged', 'build') not in [none, 'none'] }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/ota/announce/8"
          retain: true
          qos: 0
          payload: "OTA|{{ state_attr('sensor.smol_ota_staged','build') }}|{{ state_attr('sensor.smol_ota_staged','size') }}|{{ state_attr('sensor.smol_ota_staged','sha256') }}|{{ state_attr('sensor.smol_ota_staged','url') }}"
  - id: smol_ota_push_id9
    alias: "smol OTA: push staged to id9"
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_ota_push_9
    condition:
      - condition: template
        value_template: "{{ state_attr('sensor.smol_ota_staged', 'build') not in [none, 'none'] }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/ota/announce/9"
          retain: true
          qos: 0
          payload: "OTA|{{ state_attr('sensor.smol_ota_staged','build') }}|{{ state_attr('sensor.smol_ota_staged','size') }}|{{ state_attr('sensor.smol_ota_staged','sha256') }}|{{ state_attr('sensor.smol_ota_staged','url') }}"
  - id: smol_ota_rollout_rest
    alias: "smol OTA: roll out to rest (id8+id9) after id7 canary healthy"
    description: >-
      Publishes the staged announce to id8 + id9 — GATED: fires only once id7's
      running build (smol/7/status) equals the staged build, i.e. the canary came
      back healthy. Inert until the firmware publishes smol/<id>/status (F4) — so it
      cannot fleet-flash before a canary is proven. id7 is the canary by convention.
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_ota_rollout
    condition:
      - condition: template
        value_template: "{{ state_attr('sensor.smol_ota_staged', 'build') not in [none, 'none'] }}"
      - condition: template
        value_template: "{{ state_attr('sensor.smol_7_status', 'build') == state_attr('sensor.smol_ota_staged', 'build') }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/ota/announce/8"
          retain: true
          qos: 0
          payload: "OTA|{{ state_attr('sensor.smol_ota_staged','build') }}|{{ state_attr('sensor.smol_ota_staged','size') }}|{{ state_attr('sensor.smol_ota_staged','sha256') }}|{{ state_attr('sensor.smol_ota_staged','url') }}"
      - service: mqtt.publish
        data:
          topic: "smol/ota/announce/9"
          retain: true
          qos: 0
          payload: "OTA|{{ state_attr('sensor.smol_ota_staged','build') }}|{{ state_attr('sensor.smol_ota_staged','size') }}|{{ state_attr('sensor.smol_ota_staged','sha256') }}|{{ state_attr('sensor.smol_ota_staged','url') }}"
  - id: smol_ota_clear_all
    alias: "smol OTA: clear all announces (abort)"
    description: >-
      Retain-deletes smol/ota/announce/{7,8,9} (empty payload) — the R-P1 lifecycle
      abort. Does NOT touch smol/ota/staged (the staged target stays for re-push).
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.smol_ota_clear
    action:
      - service: mqtt.publish
        data: { topic: "smol/ota/announce/7", retain: true, payload: "" }
      - service: mqtt.publish
        data: { topic: "smol/ota/announce/8", retain: true, payload: "" }
      - service: mqtt.publish
        data: { topic: "smol/ota/announce/9", retain: true, payload: "" }
