  # --- #70 silent-rollback alert — pushes the instant a node reports ota=rolled-back ---
  - alias: "smol · OTA rolled back → alert (#70)"
    id: smol_ota_rollback_alert
    trigger:
      - platform: state
        entity_id:
          - sensor.smol_7_ota_outcome
          - sensor.smol_8_ota_outcome
          - sensor.smol_9_ota_outcome
        to: "rolled-back"
    action:
      - service: persistent_notification.create
        data:
          title: "smol OTA rollback"
          message: >
            {% set n = trigger.entity_id.split('_')[1] %}
            id{{ n }} rolled back its OTA (slot {{ states('sensor.smol_' ~ n ~ '_boot_slot') }},
            reset {{ states('sensor.smol_' ~ n ~ '_reset_reason') }}).

  # --- #45 publish per-node Custom screen layouts (retained → smol/<id>/config/custom, KV key Y) ---
  # The compose sensor (sensor.smol_<id>_custom_lay) auto-updates on the author string AND any
  # referenced {entity}, so its state-change covers live-refresh; + HA start + a 5-min heartbeat.
  - id: smol_publish_custom_lay
    alias: "smol: publish per-node Custom screen layouts (retained, #45)"
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        entity_id:
          - sensor.smol_7_custom_lay
          - sensor.smol_8_custom_lay
          - sensor.smol_9_custom_lay
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/5"
    action:
      - repeat:
          for_each: ["7", "8", "9"]
          sequence:
            - service: mqtt.publish
              data:
                topic: "smol/{{ repeat.item }}/config/custom"
                retain: true
                qos: 0
                payload: "{{ states('sensor.smol_' ~ repeat.item ~ '_custom_lay') }}"

  # --- #55 publish per-node plugin visibility mask (retained → smol/<id>/config/plugins) ---
  - id: smol_publish_plugins
    alias: "smol: publish per-node plugin visibility mask (retained, #55)"
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        entity_id:
          - input_boolean.smol_7_plugin_clock
          - input_boolean.smol_7_plugin_snake
          - input_boolean.smol_7_plugin_bench
          - input_boolean.smol_7_plugin_batt
          - input_boolean.smol_7_plugin_grid
          - input_boolean.smol_7_plugin_wled
          - input_boolean.smol_7_plugin_about
          - input_boolean.smol_7_plugin_familiar
          - input_boolean.smol_8_plugin_clock
          - input_boolean.smol_8_plugin_snake
          - input_boolean.smol_8_plugin_bench
          - input_boolean.smol_8_plugin_batt
          - input_boolean.smol_8_plugin_grid
          - input_boolean.smol_8_plugin_wled
          - input_boolean.smol_8_plugin_about
          - input_boolean.smol_8_plugin_familiar
          - input_boolean.smol_9_plugin_clock
          - input_boolean.smol_9_plugin_snake
          - input_boolean.smol_9_plugin_bench
          - input_boolean.smol_9_plugin_batt
          - input_boolean.smol_9_plugin_grid
          - input_boolean.smol_9_plugin_wled
          - input_boolean.smol_9_plugin_about
          - input_boolean.smol_9_plugin_familiar
      - platform: homeassistant
        event: start
    action:
      - repeat:
          for_each: ["7", "8", "9"]
          sequence:
            - variables:
                n: "{{ repeat.item }}"
                mask: >-
                  {% set b = namespace(m=0) %}
                  {% for name, val in [['clock',1],['snake',2],['bench',4],['batt',8],['grid',16],['wled',32],['about',64],['familiar',128]] %}
                  {% if is_state('input_boolean.smol_' ~ n ~ '_plugin_' ~ name, 'on') %}{% set b.m = b.m + val %}{% endif %}
                  {% endfor %}
                  {{ '%04X' | format(b.m) }}
            - service: mqtt.publish
              data:
                topic: "smol/{{ n }}/config/plugins"
                retain: true
                qos: 0
                payload: "{{ mask }}"
