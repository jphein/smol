      - name: "smol 9 rssi band"
        unique_id: smol_9_rssi_band
        state: >-
          {% set r = states('sensor.smol_9_rssi') | int(-999) %}
          {{ 'unknown' if r == -999 else 'strong' if r >= -55 else 'good' if r >= -70 else 'weak' if r >= -82 else 'faint' }}
  - binary_sensor:
      - name: "smol mesh asleep"
        unique_id: smol_mesh_asleep
        state: "{{ states('sensor.smol_mesh_channel') in ['unknown','unavailable','none',''] }}"

  - sensor:
      # --- #74 RSSI-matrix union (HELD; populates when every node publishes smol/<id>/peers) ---
      - name: "smol mesh matrix"
        unique_id: smol_mesh_matrix
        state: >-
          {{ states.sensor | selectattr('entity_id','search','^sensor\\.smol_\\d+_peers$') | list | count }} nodes
        attributes:
          edges: >-
            {% set ns = namespace(e=[]) %}
            {% for s in states.sensor | selectattr('entity_id','search','^sensor\\.smol_\\d+_peers$') %}
              {% set src = s.entity_id.split('_')[1] %}
              {% for p in state_attr(s.entity_id,'peers') or [] %}
                {% set f = p.split(',') %}
                {% if f | length >= 2 %}
                  {% set ns.e = ns.e + [{'from': src, 'to': f[0], 'rssi': f[1]|int(0), 'age': (f[2]|int(0) if f|length>2 else 0), 'ch': (f[3] if f|length>3 else ''), 'flags': (f[4] if f|length>4 else '')}] %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {{ ns.e }}

  # =====================================================================================
  # #74 item 3 — config-drift COMPARATOR (fw contract PINNED in #74 stage-2).
  # `_expected` rebuilds the SAME canonical string the fw emits in `cfg=`, from the retained
  # COMMAND topics HA published. `config_drift` does a ROBUST FIELD-BY-FIELD compare (not a
  # brittle whole-string equality): a field is only judged when HA has actually commanded it
  # (a still-unknown command topic = "no opinion" = never drift), and the screen field
  # tolerates a commanded default that omits the `:page`. So a half-configured node does NOT
  # false-alarm; drift lights only on a genuine live≠desired (dropped CFG relay / stale NVS /
  # manual nav off the commanded default). Attributes surface applied-vs-expected for debug.
  # NOTE: logic host-validated (jinja mocks, 10 scenarios); confirm on the id7 canary that the
  # live cfg= string parses as expected before trusting the dashboard drift chip.
  - sensor:
      - name: "smol 7 config expected"
        unique_id: smol_7_config_expected
        icon: "mdi:cog-outline"
        state: >-
          {% set scr = states('sensor.smol_7_config') %}
          {% set led = states('sensor.smol_7_led') %}
          {% set mask = states('sensor.smol_7_plugins') %}
          {% set units = (state_attr('sensor.smol_units','temp') or 'F') ~ (state_attr('sensor.smol_units','clock') or '24') %}
          {{ scr }},{{ led }},{{ mask }},{{ units }}
      - name: "smol 8 config expected"
        unique_id: smol_8_config_expected
        icon: "mdi:cog-outline"
        state: >-
          {% set scr = states('sensor.smol_8_config') %}
          {% set led = states('sensor.smol_8_led') %}
          {% set mask = states('sensor.smol_8_plugins') %}
          {% set units = (state_attr('sensor.smol_units','temp') or 'F') ~ (state_attr('sensor.smol_units','clock') or '24') %}
          {{ scr }},{{ led }},{{ mask }},{{ units }}
      - name: "smol 9 config expected"
        unique_id: smol_9_config_expected
        icon: "mdi:cog-outline"
        state: >-
          {% set scr = states('sensor.smol_9_config') %}
          {% set led = states('sensor.smol_9_led') %}
          {% set mask = states('sensor.smol_9_plugins') %}
          {% set units = (state_attr('sensor.smol_units','temp') or 'F') ~ (state_attr('sensor.smol_units','clock') or '24') %}
          {{ scr }},{{ led }},{{ mask }},{{ units }}
  - binary_sensor:
      - name: "smol 7 config drift"
        unique_id: smol_7_config_drift
        device_class: problem
        icon: "mdi:cog-sync"
        state: >-
          {% set ap = states('sensor.smol_7_config_applied') %}
          {% set ns = namespace(drift=false) %}
          {% if ap not in ['unknown','unavailable','none',''] %}
            {% set f = ap.split(',') %}
            {% if f | length >= 4 %}
              {% set e_scr = states('sensor.smol_7_config') %}
              {% set e_led = states('sensor.smol_7_led') %}
              {% set e_mask = states('sensor.smol_7_plugins') %}
              {% set e_units = (state_attr('sensor.smol_units','temp') or '') ~ (state_attr('sensor.smol_units','clock') or '') %}
              {% if e_scr not in ['unknown','unavailable','none',''] %}
                {% set a_cmp = f[0] if ':' in e_scr else f[0].split(':')[0] %}
                {% if a_cmp != e_scr %}{% set ns.drift = true %}{% endif %}
              {% endif %}
              {% if e_led not in ['unknown','unavailable','none',''] and f[1] != e_led %}{% set ns.drift = true %}{% endif %}
              {% if e_mask not in ['unknown','unavailable','none',''] and f[2] != e_mask %}{% set ns.drift = true %}{% endif %}
              {% if e_units | length == 3 and f[3] != e_units %}{% set ns.drift = true %}{% endif %}
            {% endif %}
          {% endif %}
          {{ ns.drift }}
        attributes:
          applied: "{{ states('sensor.smol_7_config_applied') }}"
          expected: "{{ states('sensor.smol_7_config_expected') }}"
      - name: "smol 8 config drift"
        unique_id: smol_8_config_drift
        device_class: problem
        icon: "mdi:cog-sync"
        state: >-
          {% set ap = states('sensor.smol_8_config_applied') %}
          {% set ns = namespace(drift=false) %}
          {% if ap not in ['unknown','unavailable','none',''] %}
            {% set f = ap.split(',') %}
            {% if f | length >= 4 %}
              {% set e_scr = states('sensor.smol_8_config') %}
              {% set e_led = states('sensor.smol_8_led') %}
              {% set e_mask = states('sensor.smol_8_plugins') %}
              {% set e_units = (state_attr('sensor.smol_units','temp') or '') ~ (state_attr('sensor.smol_units','clock') or '') %}
              {% if e_scr not in ['unknown','unavailable','none',''] %}
                {% set a_cmp = f[0] if ':' in e_scr else f[0].split(':')[0] %}
                {% if a_cmp != e_scr %}{% set ns.drift = true %}{% endif %}
              {% endif %}
              {% if e_led not in ['unknown','unavailable','none',''] and f[1] != e_led %}{% set ns.drift = true %}{% endif %}
              {% if e_mask not in ['unknown','unavailable','none',''] and f[2] != e_mask %}{% set ns.drift = true %}{% endif %}
              {% if e_units | length == 3 and f[3] != e_units %}{% set ns.drift = true %}{% endif %}
            {% endif %}
          {% endif %}
          {{ ns.drift }}
        attributes:
          applied: "{{ states('sensor.smol_8_config_applied') }}"
          expected: "{{ states('sensor.smol_8_config_expected') }}"
      - name: "smol 9 config drift"
        unique_id: smol_9_config_drift
        device_class: problem
        icon: "mdi:cog-sync"
        state: >-
          {% set ap = states('sensor.smol_9_config_applied') %}
          {% set ns = namespace(drift=false) %}
          {% if ap not in ['unknown','unavailable','none',''] %}
            {% set f = ap.split(',') %}
            {% if f | length >= 4 %}
              {% set e_scr = states('sensor.smol_9_config') %}
              {% set e_led = states('sensor.smol_9_led') %}
              {% set e_mask = states('sensor.smol_9_plugins') %}
              {% set e_units = (state_attr('sensor.smol_units','temp') or '') ~ (state_attr('sensor.smol_units','clock') or '') %}
              {% if e_scr not in ['unknown','unavailable','none',''] %}
                {% set a_cmp = f[0] if ':' in e_scr else f[0].split(':')[0] %}
                {% if a_cmp != e_scr %}{% set ns.drift = true %}{% endif %}
              {% endif %}
              {% if e_led not in ['unknown','unavailable','none',''] and f[1] != e_led %}{% set ns.drift = true %}{% endif %}
              {% if e_mask not in ['unknown','unavailable','none',''] and f[2] != e_mask %}{% set ns.drift = true %}{% endif %}
              {% if e_units | length == 3 and f[3] != e_units %}{% set ns.drift = true %}{% endif %}
            {% endif %}
          {% endif %}
          {{ ns.drift }}
        attributes:
          applied: "{{ states('sensor.smol_9_config_applied') }}"
          expected: "{{ states('sensor.smol_9_config_expected') }}"

automation:
  - id: smol_publish_batt_display
    alias: "smol: publish battery display payload (retained)"
    description: >-
      Publishes the display-ready payload to smol/display/batt (retained, QoS0):
      6 segments `BATT|v1|v2|v3|s1|s2|s3` — the voltage trio (1-3) is the manual
      override text when input_boolean.smol_display_override is ON, otherwise the
      live battery voltages; the SOC trio (4-6, issue #17) is always appended.
      Fires on any source-sensor change, any override-helper change, every 5
      minutes, and at HA start. Stale (voltage/EPEver >30 min, HV SOC >6 h) or
      unavailable sources render as `--` per segment.
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        id: sensor_change
        entity_id:
          - sensor.48v_battery1_voltage
          - sensor.48v_battery2_voltage
          - sensor.be_battery_voltage
          - sensor.be_cell_voltage_delta
          # SOC page (issue #17, segments 4-6). 48V SOC = the BMS (coulomb-counted,
          # same source we trust for the voltage line) — decoupled from the flaky
          # EPEver bus per team ruling 2026-07-08. Charge current (s3, still EPEver)
          # rides the 5-min heartbeat instead of triggering, to avoid churn.
          - sensor.48v_battery1_battery
          - sensor.48v_battery2_battery
          - sensor.be_soc
          - sensor.battery_state_of_charge
      - platform: state
        id: override_change
        entity_id:
          - input_boolean.smol_display_override
          - input_text.smol_display_line1
          - input_text.smol_display_line2
          - input_text.smol_display_line3
      - platform: time_pattern
        id: heartbeat
        minutes: "/5"
      - platform: homeassistant
        event: start
        id: ha_start
    action:
      - service: mqtt.publish
        data:
          topic: smol/display/batt
          retain: true
          qos: 0
          # `>-` folds the block to one line; the {%- -%} trims + per-cell |trim
          # make the rendered output EXACTLY the `BATT|...` line, no stray space.
          # The SOC trio (s1/s2/s3) is computed ONCE and appended in both branches
          # so the SOC page is available even mid-override (issue #17).
          # Override ON -> `subst()` resolves {entity_id} placeholders in each line
          # source (unknown -> `--`), then `|` is stripped and the line clipped to
          # 12; OFF -> the live battery voltages. The `cell(label, entities, fmt,
          # maxage)` macro picks the first available source from its fallback list
          # whose `last_reported` is within `maxage` (default 1800 s; HV SOC 21600 s).
          payload: >-
            {%- macro cell(label, entities, fmt, maxage=1800) -%}
            {%- set ns = namespace(out=label ~ ' --', found=false) -%}
            {%- for ent in entities -%}
            {%- if not ns.found -%}
            {%- set s = states[ent] -%}
            {%- if s is not none and (s.state | lower) not in ['unknown', 'unavailable', 'none', ''] and (now() - s.last_reported).total_seconds() <= maxage -%}
            {%- set ns.out = label ~ ' ' ~ (fmt | format(s.state | float)) -%}
            {%- set ns.found = true -%}
            {%- endif -%}
            {%- endif -%}
            {%- endfor -%}
            {{- ns.out -}}
            {%- endmacro -%}
            {%- macro subst(src) -%}
            {%- set ns = namespace(out=src) -%}
            {%- for id in src | regex_findall('\{([a-z0-9_.]+)\}') -%}
            {%- set v = states(id) -%}
            {%- set v = '--' if (v | lower) in ['unknown', 'unavailable', 'none', ''] else v -%}
            {%- set ns.out = ns.out | replace('{' ~ id ~ '}', v) -%}
            {%- endfor -%}
            {{- ns.out -}}
            {%- endmacro -%}
            {%- set s1 = cell('48V', ['sensor.48v_battery1_battery', 'sensor.48v_battery2_battery'], '%.0f%%') | trim -%}
            {%- set s2 = cell('HV', ['sensor.be_soc', 'sensor.battery_state_of_charge'], '%.0f%%', 21600) | trim -%}
            {%- set s3 = cell('Chg', ['sensor.epever_charging_current'], '%.1fA') | trim -%}
            {%- if is_state('input_boolean.smol_display_override', 'on') -%}
            {%- set bad = ['unknown', 'unavailable', 'none', ''] -%}
            {%- set o1 = states('input_text.smol_display_line1') -%}
            {%- set o2 = states('input_text.smol_display_line2') -%}
            {%- set o3 = states('input_text.smol_display_line3') -%}
            {%- set l1 = '' if (o1 | lower) in bad else (subst(o1) | replace('|', ''))[:12] -%}
            {%- set l2 = '' if (o2 | lower) in bad else (subst(o2) | replace('|', ''))[:12] -%}
            {%- set l3 = '' if (o3 | lower) in bad else (subst(o3) | replace('|', ''))[:12] -%}
            BATT|{{ l1 }}|{{ l2 }}|{{ l3 }}|{{ s1 }}|{{ s2 }}|{{ s3 }}
            {%- else -%}
            BATT|{{ cell('48V', ['sensor.48v_battery1_voltage', 'sensor.48v_battery2_voltage'], '%.1fV') | trim }}|{{ cell('HV', ['sensor.be_battery_voltage'], '%.1fV') | trim }}|{{ cell('d', ['sensor.be_cell_voltage_delta'], '%.0fmV') | trim }}|{{ s1 }}|{{ s2 }}|{{ s3 }}
            {%- endif -%}

  # --- GRID display (issue #16, v2.2 EXTENSION) -----------------------------
  # A SECOND retained payload for the grid/consumption page the boards page to,
  # separate from the batt payload (own topic, own automation, own triggers):
  #   GRID|1118W|L1 150W|L2 970W
  #   - line 1 (no label): TOTAL = sensor.yurt_consumption — the "yurt consumption"
  #     sensor JP watches on his dashboard (a calculated sum over the two PJ2101A
  #     clamps). It reports in kW, so it is scaled ×1000 to WATTS for unit
  #     consistency with the legs. (sensor.total_grid_power is the same value already
  #     in W, but JP watches "yurt consumption", so that is the source of truth.)
  #   - line 2 `L1`: sensor.l1_power_clamp (W) · line 3 `L2`: sensor.l2_power_clamp (W)
  #   - same envelope as batt: ≤96 B, ≤12 ch/line, ASCII; per-line `--` on
  #     unavailable/unknown/STALE (>30 min last_reported). A value that would exceed
  #     5 digits of watts switches THAT line to `X.XXkW` (safety valve; a yurt won't).
  # Kept as its own automation (not a shared macro with batt) because power lines
  # need kW/W scaling + an empty-label total that the batt `cell()` macro doesn't —
  # two focused automations read cleaner than one merged one, and this leaves the
  # already-live batt publish untouched.
  - id: smol_publish_grid_display
    alias: "smol: publish grid display payload (retained)"
    description: >-
      Publishes the grid/consumption payload to smol/display/grid (retained, QoS0):
      GRID|<total>|L1 <l1>W|L2 <l2>W. Total = the "yurt consumption" sensor (kW,
      scaled to W); legs = the two PJ2101A power clamps (W). Fires on any of the
      three source changes, every 5 minutes, and at HA start. Stale (>30 min) or
      unavailable sources render `--` per line.
    mode: single
    max_exceeded: silent
    trigger:
      - platform: state
        id: grid_change
        entity_id:
          - sensor.yurt_consumption
          - sensor.l1_power_clamp
          - sensor.l2_power_clamp
      - platform: time_pattern
        id: heartbeat
        minutes: "/5"
      - platform: homeassistant
        event: start
        id: ha_start
    action:
      - service: mqtt.publish
        data:
          topic: smol/display/grid
          retain: true
          qos: 0
          # `pcell(label, entity, scale, maxage)` renders one power segment: an empty
          # label -> bare value (the total line); `scale` converts kW->W (total=1000,
          # legs=1); a magnitude >=100000 W renders `X.XXkW`; unavailable/unknown or
          # last_reported older than `maxage` (30 min) -> `--`.
          payload: >-
            {%- macro pcell(label, entity, scale, maxage=1800) -%}
            {%- set pre = (label ~ ' ') if label else '' -%}
            {%- set s = states[entity] -%}
            {%- if s is not none and (s.state | lower) not in ['unknown', 'unavailable', 'none', ''] and (now() - s.last_reported).total_seconds() <= maxage -%}
            {%- set w = (s.state | float) * scale -%}
            {%- if (w | abs) >= 100000 -%}
            {{- pre ~ ('%.2fkW' | format(w / 1000)) -}}
            {%- else -%}
            {{- pre ~ ('%.0fW' | format(w)) -}}
            {%- endif -%}
            {%- else -%}
            {{- pre ~ '--' -}}
            {%- endif -%}
            {%- endmacro -%}
            GRID|{{ pcell('', 'sensor.yurt_consumption', 1000) | trim }}|{{ pcell('L1', 'sensor.l1_power_clamp', 1) | trim }}|{{ pcell('L2', 'sensor.l2_power_clamp', 1) | trim }}

  # =====================================================================
  # #43 DISPLAY UNITS automation — publish the GLOBAL retained units config.
  # Trigger = either units input_select changing; payload = <F|C>|<12|24> from the
  # closed-set selects (always a valid token). GLOBAL: one topic, whole fleet (the
  # gateway relays it to leaves over the mesh — FW/lucid). Default (never published) = F|24.
  # =====================================================================
  - id: smol_units_publish
    alias: "smol #43: publish global display units"
    description: >-
      On either units select changing, publish retained smol/config/units =
      <F|C>|<12|24> (broker retention = persistence; the gateway reads it on its burst).
    mode: single
    trigger:
      - platform: state
        entity_id:
          - input_select.smol_temp_unit
          - input_select.smol_clock_format
    condition:
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/config/units"
          retain: true
          qos: 0
          payload: "{{ 'F' if is_state('input_select.smol_temp_unit', '°F') else 'C' }}|{{ '24' if is_state('input_select.smol_clock_format', '24h') else '12' }}"

  # =====================================================================
  # #48 blue-LED mode — per-node select → retained smol/<id>/config/led. status/on/off,
  # default status. Set-all fans out to every per-node select (no broadcast topic).
  # =====================================================================
  - id: smol_led_publish
    alias: "smol #48: publish per-node LED mode"
    description: >-
      On any per-node LED select changing, publish retained smol/<id>/config/led =
      status|on|off (broker retention = persistence; the gateway relays it to leaves).
    mode: parallel
    max: 10
    trigger:
      - platform: state
        entity_id:
          - input_select.smol_7_led
          - input_select.smol_8_led
          - input_select.smol_9_led
    condition:
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/{{ trigger.entity_id.split('.')[1].split('_')[1] }}/config/led"
          retain: true
          qos: 0
          payload: "{{ trigger.to_state.state }}"

  - id: smol_all_led_fanout
    alias: "smol #48: set-all LED mode → per-node selects"
    description: >-
      On the ALL LED select changing, fan out to every per-node LED select (which each
      then publish their retained smol/<id>/config/led). No broadcast topic.
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.smol_all_led
    condition:
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}"
    action:
      - service: input_select.select_option
        target:
          entity_id:
            - input_select.smol_7_led
            - input_select.smol_8_led
            - input_select.smol_9_led
        data:
          option: "{{ trigger.to_state.state }}"

  # =====================================================================
  # #100 network switch — per-node select → RETAINED smol/<id>/config/net = 0/1 (qos 1). Slot 0 =
  # "iot (jplovescl)", slot 1 = "roam" (MUST match secrets.rs WIFI_NETWORKS order). qos 1 so the
  # switch is delivered even through a flaky link (transient-command lesson). RETAINED = the gateway
  # reads it on its burst + relays it to leaves; a wrong pick self-heals (fw fallback → net=<slot>:fb).
  # =====================================================================
  - id: smol_net_publish
    alias: "smol #100: publish per-node network slot"
    description: >-
      On any per-node network select changing, publish retained smol/<id>/config/net = 0|1.
    mode: parallel
    max: 10
    trigger:
      - platform: state
        entity_id:
          - input_select.smol_7_network
          - input_select.smol_8_network
          - input_select.smol_9_network
    condition:
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}"
    action:
      - service: mqtt.publish
        data:
          topic: "smol/{{ trigger.entity_id.split('.')[1].split('_')[1] }}/config/net"
          retain: true
          qos: 1
          payload: "{{ '0' if trigger.to_state.state == 'iot (jplovescl)' else '1' }}"
      # #116: the slot IS the full network identity — clear the broker + OTA-host override
      # retained topics (and their inputs) on every switch, else the stale retained override
      # RESURRECTS on the node's next burst (one avoidable reboot + a cross-VLAN fallback
      # dance; the fw self-heals via the CONNACK fallback, this just skips the detour).
      - service: mqtt.publish
        data:
          topic: "smol/{{ trigger.entity_id.split('.')[1].split('_')[1] }}/config/broker"
          retain: true
          qos: 1
          payload: ""
      - service: mqtt.publish
        data:
          topic: "smol/{{ trigger.entity_id.split('.')[1].split('_')[1] }}/config/ota_host"
          retain: true
          qos: 1
          payload: ""
      - service: input_text.set_value
        target:
          entity_id: "input_text.smol_{{ trigger.entity_id.split('.')[1].split('_')[1] }}_broker"
        data:
          value: ""
      - service: input_text.set_value
        target:
          entity_id: "input_text.smol_{{ trigger.entity_id.split('.')[1].split('_')[1] }}_ota_host"
        data:
          value: ""

  - id: smol_all_net_fanout
    alias: "smol #100: set-all network → per-node selects"
    description: >-
      On the ALL network select changing, fan out to every per-node network select (each then
      publishes its retained smol/<id>/config/net). No broadcast topic (mirrors the LED fanout).
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.smol_all_network
    condition:
      - condition: template
        value_template: "{{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}"
    action:
