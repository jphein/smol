# =====================================================================
# KEYED CFG RELAY (issue #56) — the ONE wire that carries ALL per-node config
# to the credential-less, ESP-NOW-only leaves.
# ---------------------------------------------------------------------
# A gateway subscribes each retained config topic below and re-broadcasts it to
# its leaves as a SINGLE keyed ESP-NOW frame — `SMOLv1 CFG <NNN><KEY><value>` —
# on the ~10 s cadence (NNN = 3-digit target leaf id; KEY = 1 ASCII channel byte;
# value = the verbatim retained payload). The leaf DISPATCHES on KEY and ignores
# any key its firmware predates (forward-compat). Topic → KEY contract:
#     smol/<id>/config/default_screen  → S   (screen, issue #21)   ← the ONLY key #56 ships
#     smol/<id>/config/led             → L   (blue-LED mode, #48)
#     smol/config/units                → U   (display units, GLOBAL/#43)
#     smol/<id>/config/plugins         → P   (plugin-enable mask, #55; topic TBD)
#     smol/<id>/config/net             → N   (WiFi slot 0/1, #100 Stage 1; edge-triggered reboot)
#     smol/<id>/config/broker          → B   (MQTT broker ip[:port], #100 Stage 2; reboot + fallback)
#     smol/<id>/config/ota_host        → O   (extra OTA host ip, #100 Stage 3; no reboot)
# #56 is FOUNDATION ONLY: the firmware relays the S channel (default_screen) exactly
# as before — this file's default_screen PUBLISH half is UNCHANGED, and a leaf keeps
# converging on its dashboard-set screen. The L/U/(P) topics + GUI below already exist
# HA-side; their gateway relay + leaf apply land with #48/#43/#55 (each adds one fill
# site + one dispatch arm on top of this keyed channel — no new wire frame). HA never
# emits a KEY: it publishes to the topic, the gateway maps topic → KEY on relay.
# =====================================================================
# NODE MANAGER (issue #21) — remotely set each node's DEFAULT SCREEN + page
# via retained  smol/<id>/config/default_screen = <AppKind>:<page>.
# Protocol LOCKED per nodemgr-design.md §2. This is the HA PUBLISH/GUI half;
# the firmware CONSUME side (subscribe + panic-free parse) is a later wave.
#   - AppKind tokens = EXACT app.rs spellings (case-sensitive), full espnow set.
#     Firmware ignores/clamps any token it can't build in its tier (never crashes).
#   - page: flat "0"/"1" (only Batt has 2 pages today; firmware clamps invalid -> 0).
#   - "Apply"  -> publishes the retained value (broker = persistence).
#   - "Reset"  -> publishes an EMPTY retained payload = clear -> node falls back to
#                 its board.rs DEFAULT_APP/DEFAULT_PAGE (design §2.5, R-P1 lifecycle).
#   - "Set all" -> fans out to EVERY per-node topic (NO broadcast topic — ruling #3).
#   - Closed-set input_select => HA can never emit a malformed payload (security §7);
#     the firmware still parses panic-free because the broker is LAN-writable.
# NOTE (honest, per design): credential-less leaves never open MQTT, so they use
# their board.rs default until given creds (reach = JP decision F2). The OTA panel,
# mesh-topology view, and LIVE current-screen preview are DEFERRED (JP-decisions
# F5/F6/F7 + firmware smol/<id>/status F4); v1 reflects COMMANDED config only.
# =====================================================================
input_select:
  # --- #43 display units (GLOBAL: one setting, whole fleet) → retained smol/config/units ---
  smol_temp_unit:
    name: "smol · temperature unit"
    options: ["°F", "°C"]
    initial: "°F"          # default °F = current firmware behavior
    icon: mdi:thermometer
  smol_clock_format:
    name: "smol · clock format"
    options: ["24h", "12h"]
    initial: "24h"         # default 24h = current firmware behavior
    icon: mdi:clock-outline
  # --- set-all (writes every per-node topic) ---
  smol_all_screen:
    name: "smol all · default screen"
    options: [Menu, Clock, Batt, Grid, Snake, Bench, MeshSnake, About, Custom]
    initial: Menu
    icon: mdi:monitor-multiple
  smol_all_page:
    name: "smol all · default page"
    options: ["0", "1", "2", "3"]   # 0=voltage/entry; 1-3 = Batt SOC detail pages (#17); fw wraps % page_count for screens with fewer
    initial: "0"
    icon: mdi:book-open-page-variant
  # --- id7 (one copy-paste block per node; new node = duplicate + renumber) ---
  smol_7_screen:
    name: "smol id7 · default screen"
    options: [Menu, Clock, Batt, Grid, Snake, Bench, MeshSnake, About, Custom]
    initial: Menu
    icon: mdi:monitor
  smol_7_page:
    name: "smol id7 · default page"
    options: ["0", "1", "2", "3"]   # 0=voltage/entry; 1-3 = Batt SOC detail pages (#17); fw wraps % page_count for screens with fewer
    initial: "0"
    icon: mdi:book-open-page-variant
  # --- id8 ---
  smol_8_screen:
    name: "smol id8 · default screen"
    options: [Menu, Clock, Batt, Grid, Snake, Bench, MeshSnake, About, Custom]
    initial: Menu
    icon: mdi:monitor
  smol_8_page:
    name: "smol id8 · default page"
    options: ["0", "1", "2", "3"]   # 0=voltage/entry; 1-3 = Batt SOC detail pages (#17); fw wraps % page_count for screens with fewer
    initial: "0"
    icon: mdi:book-open-page-variant
  # --- id9 ---
  smol_9_screen:
    name: "smol id9 · default screen"
    options: [Menu, Clock, Batt, Grid, Snake, Bench, MeshSnake, About, Custom]
    initial: Menu
    icon: mdi:monitor
  smol_9_page:
    name: "smol id9 · default page"
    options: ["0", "1", "2", "3"]   # 0=voltage/entry; 1-3 = Batt SOC detail pages (#17); fw wraps % page_count for screens with fewer
    initial: "0"
    icon: mdi:book-open-page-variant
  # --- #48 blue-LED mode (per-node: status/on/off, default status) → retained smol/<id>/config/led ---
  # status = LED tracks node state (fw default) · on = force on · off = force off.
  smol_all_led:
    name: "smol all · LED mode"
    options: [status, "on", "off"]
    initial: status
    icon: mdi:led-on
  smol_7_led:
    name: "smol id7 · LED mode"
    options: [status, "on", "off"]
    initial: status
    icon: mdi:led-on
  smol_8_led:
    name: "smol id8 · LED mode"
    options: [status, "on", "off"]
    initial: status
    icon: mdi:led-on
  smol_9_led:
    name: "smol id9 · LED mode"
    options: [status, "on", "off"]
    initial: status
    icon: mdi:led-on
  # --- #100 network switch (per-node: iot/roam → slot 0/1) → retained smol/<id>/config/net (qos 1).
  # ⚠️ MAPPING: option "iot (jplovescl)" = slot 0, "roam" = slot 1 — this MUST match the local
  # secrets.rs WIFI_NETWORKS order. A wrong pick self-heals via the fw assoc fallback (visible as
  # net=<slot>:fb in smol/<id>/diag) so it never bricks, but the label would mislead — verify against
  # secrets.rs at canary. Set-all fans out to every per-node select (no broadcast topic).
  smol_all_network:
    name: "smol all · network"
    options: ["iot (jplovescl)", "roam"]
    initial: "iot (jplovescl)"
    icon: mdi:wifi-sync
  smol_7_network:
    name: "smol id7 · network"
    options: ["iot (jplovescl)", "roam"]
    initial: "iot (jplovescl)"
    icon: mdi:wifi
  smol_8_network:
    name: "smol id8 · network"
    options: ["iot (jplovescl)", "roam"]
    initial: "iot (jplovescl)"
    icon: mdi:wifi
  smol_9_network:
    name: "smol id9 · network"
    options: ["iot (jplovescl)", "roam"]
    initial: "iot (jplovescl)"
    icon: mdi:wifi

