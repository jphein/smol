# smol OTA panel (issue #6 / #33 Model-A) — native Update entities + staged target
# ---------------------------------------------------------------------------
# Model-A: `tools/ota_publish.sh stage` publishes retained smol/ota/staged; every board's
# firmware-published native update.smol_<id>_<noun>_firmware entity then shows "update
# available". Install is PER-DEVICE (the entity's Install → firmware command_topic
# smol/<id>/ota/install) — there is NO fleet "install all" by design (#32 structural canary).
# Headless parity: ota_publish.sh install <id>. Deploy via WS lovelace/config/save (NOT .storage).
type: vertical-stack
cards:
  - type: markdown
    content: >
      ## smol · OTA (Model-A)


      `tools/ota_publish.sh stage` arms every board (shows *update available*).
      **Install one board at a time** via its Update entity below — canary is structural
      (no install-all). Verify a board's version advances before the next.
  - type: entities
    title: Staged target (from ota_publish.sh)
    show_header_toggle: false
    entities:
      - entity: sensor.smol_ota_staged
        name: Staged build
        icon: mdi:package-up
      - type: attribute
        entity: sensor.smol_ota_staged
        attribute: url
        name: Image URL
      - type: attribute
        entity: sensor.smol_ota_staged
        attribute: size
        name: Size (bytes)
  - type: entities
    title: Per-node firmware (native Update — canary Install)
    show_header_toggle: false
    entities:
      - entity: update.smol_7_dominion_firmware
        name: id7 Dominion
      - entity: update.smol_8_nexus_firmware
        name: id8 Nexus
      - entity: update.smol_9_herald_firmware
        name: id9 Herald
