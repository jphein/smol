# smol OTA panel (issue #6) — CANARY-first firmware push
# ---------------------------------------------------------------------------
# The GUI face of OTA. The *target* is whatever `tools/ota_publish.sh` last STAGED
# (it builds the image, hosts it on the LAN server, and publishes the announce line
# to smol/ota/staged — the panel can't hash/size a build itself). These buttons
# republish that staged line to a single node's acted topic smol/ota/announce/<id>.
#
# WORKFLOW: run `tools/ota_publish.sh stage` → the staged target appears below →
# push ONE node (canary) → confirm its "running build" advances → push the next,
# or use "roll out to rest" (gated on the id7 canary reporting the staged build).
#
# ⚠️ CAVEATS (also in ha/README.md):
#  • CANARY ONE AT A TIME — never fleet-unison. Bootloader revert-on-boot-fail is
#    UNPROVEN on hardware (ROADMAP D2); until it is, a bad image on all boards at
#    once = mass-brick. The panel deliberately has no "push all" button.
#  • "Running build" + the rollout gate need the firmware to publish smol/<id>/status
#    (design F4) — until that ships they read "unknown" and rollout stays inert (safe).
#  • Credential-less leaves can't fetch (image never crosses ESP-NOW) → USB-only.
#
# Install via WS lovelace/config/save (NOT .storage). Deployment HELD for review.
type: vertical-stack
cards:
  - type: markdown
    content: >
      ## smol · OTA push

      Push firmware **one board at a time** (canary). Target = what
      `tools/ota_publish.sh` last staged. Verify a board's **running build** advances
      before pushing the next. *No fleet-unison button by design — see caveats in the
      package/README.*

  - type: entities
    title: Staged target (from ota_publish.sh)
    show_header_toggle: false
    entities:
      - entity: sensor.smol_ota_staged
        name: Staged build
        icon: mdi:package-up
      - type: attribute
        entity: sensor.smol_ota_staged
        attribute: url
        name: Image URL
      - type: attribute
        entity: sensor.smol_ota_staged
        attribute: size
        name: Size (bytes)

  - type: entities
    title: Per-node push (canary)
    show_header_toggle: false
    entities:
      - type: attribute
        entity: sensor.smol_7_status
        attribute: build
        name: id7 running build
        icon: mdi:chip
      - entity: input_button.smol_ota_push_7
        name: Push staged → id7 (canary)
      - type: divider
      - type: attribute
        entity: sensor.smol_8_status
        attribute: build
        name: id8 running build
        icon: mdi:chip
      - entity: input_button.smol_ota_push_8
        name: Push staged → id8
      - type: divider
      - type: attribute
        entity: sensor.smol_9_status
        attribute: build
        name: id9 running build
        icon: mdi:chip
      - entity: input_button.smol_ota_push_9
        name: Push staged → id9

  - type: entities
    title: Fleet controls
    show_header_toggle: false
    entities:
      - entity: input_button.smol_ota_rollout
        name: Roll out to rest (after id7 canary healthy)
        secondary_info: last-changed
      - entity: input_button.smol_ota_clear
        name: Clear all announces (abort)
