# smol · Control Room — EXPORTED reference view (generated by build_control_room.py).
# Home-energy source entities/names are placeholders (battery_bank / ev / house / solar) — remap to yours.
title: smol · Control Room
path: smol-control
icon: mdi:chip
theme: smol
type: custom:grid-layout
layout:
  grid-template-columns: repeat(12, 1fr)
  grid-gap: 16px
  margin: 0
  mediaquery:
    '(max-width: 1000px)':
      grid-template-columns: repeat(6, 1fr)
    '(max-width: 720px)':
      grid-template-columns: 1fr
cards:
- type: markdown
  view_layout:
    grid-column: span 12
  content: '{% set on = states.binary_sensor | selectattr(''state'',''eq'',''on'') | map(attribute=''entity_id'') | select(''search'',''^binary_sensor\.smol_\d+_online$'') | list | count %}

    {% set tot = states.binary_sensor | map(attribute=''entity_id'') | select(''search'',''^binary_sensor\.smol_\d+_online$'') | list | count %}

    {% set owner = state_attr(''sensor.smol_mesh_channel'',''owner'') %}

    # control room

    **smol · esp-now mesh · home assistant**


    🟢 **MESH LIVE**{% if is_state(''binary_sensor.smol_mesh_reelecting'',''on'') %} · re-electing…{% endif %} · the Seat **id{{ owner if owner not in [''unknown'',''unavailable'',''none'',None] else ''7'' }} · Draconic Dominion** · **{{ on }}/{{ tot }}** sigils lit · retained MQTT, applies on next burst

    '
  card_mod:
    style:
      .: 'ha-card { background:none; border:none; box-shadow:none; padding:0 4px; }

        '
      ha-markdown$: 'h1 { font-family:''VT323'',''IBM Plex Mono'',monospace; font-size:54px; line-height:.8; margin:0; color:var(--primary-color); text-shadow:0 0 22px rgba(91,255,154,.35); letter-spacing:2px; }

        p { margin:5px 0 0; color:var(--secondary-text-color); font-size:12.5px; line-height:1.7; }

        strong { color:var(--primary-color); font-weight:600; }

        '
- type: markdown
  view_layout:
    grid-column: span 12
  content: '**01**&nbsp;&nbsp;the mesh · topology'
  card_mod:
    style:
      .: 'ha-card { background:none; border:none; box-shadow:none; padding:10px 4px 0; }

        '
      ha-markdown$: 'p { margin:0; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--secondary-text-color); }

        strong { color:var(--primary-color); }

        '
- type: picture
  image: /local/luna-cards/smol-topology.svg
  view_layout:
    grid-column: span 7
  card_mod:
    style: "ha-card { border:1px solid var(--ha-card-border-color); border-radius:8px; overflow:hidden;\n  box-shadow: inset 0 0 26px rgba(0,0,0,.9), var(--ha-card-box-shadow); position:relative; }\nha-card:after { content:''; position:absolute; inset:0; pointer-events:none;\n  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.28) 2px 3px); }\n"
- type: entities
  title: the mesh
  show_header_toggle: false
  entities:
  - type: section
    label: the mesh
  - type: attribute
    entity: sensor.smol_mesh_channel
    attribute: owner
    name: the Seat (owner id)
    icon: mdi:crown
  - type: attribute
    entity: sensor.smol_mesh_channel
    attribute: channel
    name: elected channel
    icon: mdi:wifi
  - type: attribute
    entity: sensor.smol_mesh_channel
    attribute: seq
    name: mesh seq
    icon: mdi:counter
  - entity: binary_sensor.smol_mesh_reelecting
    name: re-electing
    icon: mdi:crown-outline
  - entity: binary_sensor.smol_mesh_asleep
    name: mesh asleep
    icon: mdi:sleep
  - type: section
    label: sigils & bonds (bond=RSSI · adrift when ch≠mesh)
  - entity: binary_sensor.smol_7_online
    name: ♛ Draconic Dominion · id7
  - entity: sensor.smol_7_peers
    name: '   ↳ peers'
    icon: mdi:lan
  - entity: binary_sensor.smol_8_online
    name: Eldritch Nexus · id8
  - entity: sensor.smol_8_peers
    name: '   ↳ peers'
    icon: mdi:lan
  - entity: binary_sensor.smol_9_online
    name: Jade Herald · id9
  - entity: sensor.smol_9_peers
    name: '   ↳ peers'
    icon: mdi:lan
  card_mod:
    style: ha-card{position:relative;overflow:hidden}ha-card:before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary-color),transparent);opacity:.55}
  view_layout:
    grid-column: span 5
- type: markdown
  view_layout:
    grid-column: span 12
  content: '{% set on = states.binary_sensor | selectattr(''state'',''eq'',''on'') | map(attribute=''entity_id'') | select(''search'',''^binary_sensor\.smol_\d+_online$'') | list | count %}

    {% set tot = states.binary_sensor | map(attribute=''entity_id'') | select(''search'',''^binary_sensor\.smol_\d+_online$'') | list | count %}

    **02**&nbsp;&nbsp;the fleet · {{ tot }} sigils · {{ on }} online · nodes &amp; firmware

    '
  card_mod:
    style:
      .: 'ha-card { background:none; border:none; box-shadow:none; padding:10px 4px 0; }

        '
      ha-markdown$: 'p { margin:0; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--secondary-text-color); }

        strong { color:var(--primary-color); }

        '
- type: entities
  view_layout:
    grid-column: span 12
  title: set all sigils → default screen
  show_header_toggle: false
  entities:
  - entity: input_select.smol_all_screen
    name: Screen (all nodes)
  - entity: input_select.smol_all_page
    name: Page (all)
  - entity: input_button.smol_all_apply
    name: Apply to all — retained, on next burst
    icon: mdi:send-check
  card_mod:
    style: 'ha-card { position:relative; overflow:hidden; }

      ha-card:before { content:''''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent-color),transparent); opacity:.55; }

      '
- type: vertical-stack
  view_layout:
    grid-column: span 4
  cards:
  - type: custom:mushroom-template-card
    primary: Draconic Dominion
    secondary: '{% set on=is_state(''binary_sensor.smol_7_online'',''on'') %}{% set t=states(''sensor.smol_7_temp'') %}{% set v=states(''sensor.smol_7_voltage'') %}{% set na=[''unavailable'',''unknown'',''none'',''None'',''''] %}id7 · the Seat · {{ ''🟢 online'' if on else ''🔴 offline'' }} · {{ t if t not in na else ''—'' }}° · {{ v if v not in na else ''—'' }}V'
    icon: mdi:crown
    icon_color: amber
    badge_icon: mdi:crown
    badge_color: amber
    card_mod:
      style:
        .: ha-card{position:relative;overflow:hidden}ha-card:before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent-color),transparent);opacity:.55}ha-card{border-radius:10px 10px 0 0;border-bottom:none}
        mushroom-state-info$: .primary{font-family:'VT323','IBM Plex Mono',monospace;font-size:26px;line-height:.9}.secondary{font-size:11px}
  - type: custom:mushroom-template-card
    primary: '{% set t=states(''sensor.smol_7_temp'') %}{% set na=[''unavailable'',''unknown'',''none'',''None'',''''] %}{{ t if (t not in na and is_state(''binary_sensor.smol_7_online'',''on'')) else ''—'' }}'
    secondary: '{{ states(''input_select.smol_7_screen'')|upper }} · {{ ''live °F'' if is_state(''binary_sensor.smol_7_online'',''on'') else ''no link'' }}'
    icon: mdi:blank
    card_mod:
      style:
        .: ha-card{background:#020402;border:1px solid var(--ha-card-border-color);border-radius:0;box-shadow:inset 0 0 12px rgba(0,0,0,.9);position:relative;overflow:hidden;margin-top:-2px}mushroom-shape-icon{display:none}
        mushroom-state-info$: .primary{font-family:'VT323','IBM Plex Mono',monospace;font-size:44px;line-height:.8;color:var(--primary-color);text-shadow:0 0 7px rgba(91,255,154,.55)}.secondary{color:var(--primary-color);opacity:.7;font-size:10px}
  - type: entities
    show_header_toggle: false
    entities:
    - type: section
      label: screen & mode
    - entity: input_select.smol_7_screen
      name: default screen
    - entity: input_select.smol_7_page
      name: page
    - entity: input_button.smol_7_apply
      name: Apply → id7
      icon: mdi:send
    - entity: input_button.smol_7_reset
      name: Reset to board default
      icon: mdi:backup-restore
    - type: section
      label: readback
    - entity: sensor.smol_7_config
      name: commanded (retained)
      icon: mdi:cog
    - entity: sensor.smol_7_screen
      name: current screen
      icon: mdi:monitor-eye
    - entity: sensor.smol_7_status
      name: activity
      icon: mdi:pulse
    - type: section
      label: firmware
    - entity: update.smol_7_dominion_firmware
      name: firmware (version + update)
    - entity: input_button.smol_ota_install_7
      name: Install staged (canary)
      icon: mdi:rocket-launch
    card_mod:
      style: ha-card{border-radius:0 0 10px 10px;border-top:none;margin-top:-1px}
