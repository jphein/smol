- type: markdown
  view_layout:
    grid-column: span 12
  content: '**smol · Control Room** — one phosphor surface for the ESP-NOW mesh: live topology, per-node screens + firmware, the shared glass, power, and the OTA forge. Retained MQTT everywhere; nodes apply on their next burst — no reflash. Fleet + topology auto-scale as sigils join.

    '
  card_mod:
    style:
      .: 'ha-card { background:none; border:none; box-shadow:none; }

        '
      ha-markdown$: 'p { font-size:11px; color:var(--secondary-text-color); line-height:1.8; border-top:1px solid var(--ha-card-border-color); padding-top:12px; }

        strong { color:var(--primary-text-color); }

        '
