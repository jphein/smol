        mushroom-state-info$: .primary{font-family:'VT323','IBM Plex Mono',monospace;font-size:26px;line-height:.9}.secondary{font-size:11px}
  - type: custom:mushroom-template-card
    primary: '{% set scr=(states(''sensor.smol_9_screen'') if states(''sensor.smol_9_screen'') not in [''unavailable'',''unknown'',''none'',''None'',''''] else states(''input_select.smol_9_screen'')) %}{% set t=states(''sensor.smol_9_temp'') %}{% set g=states(''sensor.smol_display_grid'') %}{% set na=[''unavailable'',''unknown'',''none'',''None'',''''] %}{% if not is_state(''binary_sensor.smol_9_online'',''on'') %}—{% elif scr==''Grid'' %}{{ g.split(''|'')[1] if ''|'' in g else ''—'' }}{% elif scr==''Batt'' %}{{ states(''sensor.ev_battery_soc'') }}%{% elif scr==''Clock'' %}{{ now().strftime(''%H:%M'') }}{% else %}{{ t if t not in na else ''—'' }}{% endif %}'
    secondary: '{% set scr=(states(''sensor.smol_9_screen'') if states(''sensor.smol_9_screen'') not in [''unavailable'',''unknown'',''none'',''None'',''''] else states(''input_select.smol_9_screen'')) %}{{ scr|upper }} · {% if not is_state(''binary_sensor.smol_9_online'',''on'') %}no link{% elif scr==''Grid'' %}shared glass{% elif scr==''Batt'' %}HV pack{% elif scr==''Clock'' %}mesh time{% else %}live °F{% endif %}'
    icon: mdi:blank
    card_mod:
      style:
        .: ha-card{background:#020402;border:1px solid var(--ha-card-border-color);border-radius:0;box-shadow:inset 0 0 12px rgba(0,0,0,.9);position:relative;overflow:hidden;margin-top:-2px;opacity:{% if is_state('binary_sensor.smol_9_online','on') %}1{% else %}.6{% endif %}}mushroom-shape-icon{display:none}
        mushroom-state-info$: .primary{font-family:'VT323','IBM Plex Mono',monospace;font-size:44px;line-height:.8;color:var(--primary-color);text-shadow:0 0 7px rgba(91,255,154,.55)}.secondary{color:var(--primary-color);opacity:.7;font-size:10px}
  - type: entities
    show_header_toggle: false
    entities:
    - type: section
      label: screen & mode
    - entity: input_select.smol_9_screen
      name: default screen
    - entity: input_select.smol_9_page
      name: page
    - entity: input_select.smol_9_led
      name: LED (status / on / off)
      icon: mdi:led-on
    - entity: input_button.smol_9_apply
      name: Apply → id9
      icon: mdi:send
    - entity: input_button.smol_9_reset
      name: Reset to board default
      icon: mdi:backup-restore
    - entity: input_button.smol_9_reboot
      name: Reboot node
      icon: mdi:restart-alert
      tap_action:
        action: perform-action
        perform_action: input_button.press
        target:
          entity_id: input_button.smol_9_reboot
        confirmation:
          text: Reboot id9 (Jade Herald)? It drops off the mesh briefly.
    - type: section
      label: readback
    - entity: sensor.smol_9_config
      name: default screen (commanded)
      icon: mdi:monitor-dashboard
    - entity: sensor.smol_9_screen
      name: current screen (live)
      icon: mdi:monitor-eye
    - entity: sensor.smol_9_status
      name: activity
      icon: mdi:pulse
    - entity: sensor.smol_9_rssi
      name: bond (RSSI)
      icon: mdi:signal
    - entity: sensor.smol_9_rssi_band
      name: bond band
      icon: mdi:signal-cellular-2
    - entity: binary_sensor.smol_9_resync
      name: re-syncing
      icon: mdi:sync
    - type: section
      label: firmware
    - entity: update.smol_9_herald_firmware
      name: firmware (version + update)
    - entity: input_button.smol_ota_install_9
      name: Install (when this leads)
      icon: mdi:rocket-launch
    card_mod:
      style: ha-card{border-radius:0 0 10px 10px;border-top:none;margin-top:-1px;opacity:{% if is_state('binary_sensor.smol_9_online','on') %}1{% else %}.6{% endif %}}
- type: markdown
  view_layout:
    grid-column: span 12
  content: '**03**&nbsp;&nbsp;the glass · power · the forge'
  card_mod:
    style:
      .: 'ha-card { background:none; border:none; box-shadow:none; padding:10px 4px 0; }

        '
      ha-markdown$: 'p { margin:0; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--secondary-text-color); }

        strong { color:var(--primary-color); }

        '
- type: vertical-stack
  view_layout:
    grid-column: span 4
  cards:
  - type: custom:mushroom-template-card
    primary: '{{ states(''sensor.smol_display_batt'').replace(''|'','' · '') if states(''sensor.smol_display_batt'') not in [''unknown'',''unavailable'',''none'',''''] else ''BATT · —'' }}'
    secondary: '{{ states(''sensor.smol_display_grid'').replace(''|'','' · '') if states(''sensor.smol_display_grid'') not in [''unknown'',''unavailable'',''none'',''''] else ''GRID · —'' }}'
    icon: mdi:blank
    card_mod:
      style:
        .: 'ha-card{background:#020402;border:1px solid var(--ha-card-border-color);border-radius:10px 10px 0 0;border-bottom:none;box-shadow:inset 0 0 12px rgba(0,0,0,.9);position:relative;overflow:hidden;padding-top:22px}

          ha-card:before{content:''THE GLASS · what every board mirrors'';position:absolute;top:7px;left:14px;font-size:9px;letter-spacing:1px;color:#2f7a4e;z-index:2}

          ha-card:after{content:'''';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.35) 2px 3px)}

          mushroom-shape-icon{display:none}

          '
        mushroom-state-info$: '.primary{font-family:''VT323'',''IBM Plex Mono'',monospace;font-size:19px;line-height:1.2;color:var(--primary-color);text-shadow:0 0 5px rgba(91,255,154,.5);white-space:normal}

          .secondary{font-family:''VT323'',''IBM Plex Mono'',monospace;font-size:19px;line-height:1.2;color:var(--primary-color);opacity:.85;white-space:normal}

          '
  - type: entities
    show_header_toggle: false
    card_mod:
      style: ha-card{border-radius:0 0 10px 10px;border-top:none;margin-top:-1px}
    entities:
    - type: section
      label: override the glass
    - entity: input_boolean.smol_display_override
      name: Override — hand-write lines
      icon: mdi:pencil
    - entity: input_text.smol_display_line1
      name: Line 1
    - entity: input_text.smol_display_line2
      name: Line 2
    - entity: input_text.smol_display_line3
      name: Line 3
- type: vertical-stack
  view_layout:
    grid-column: span 4
  cards:
  - type: horizontal-stack
    cards:
    - type: gauge
      entity: sensor.battery_bank_soc
      name: battery bank
      unit: '%'
      min: 0
      max: 100
      severity:
        green: 60
        yellow: 35
        red: 0
    - type: gauge
      entity: sensor.ev_battery_soc
      name: EV HV
      unit: '%'
      min: 0
      max: 100
      severity:
        green: 50
        yellow: 25
        red: 0
  - type: entities
    title: power & solar · sources on the glass
    show_header_toggle: false
    entities:
    - entity: sensor.house_load
      name: house load
    - entity: sensor.solar_charge_current
      name: solar charge
    card_mod:
      style: 'ha-card { position:relative; overflow:hidden; margin-top:-2px; }

        ha-card:before { content:''''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--primary-color),transparent); opacity:.55; }

        '
- type: vertical-stack
  view_layout:
    grid-column: span 4
  cards:
  - type: entities
    title: the forge · OTA (canary-first)
    show_header_toggle: false
    card_mod:
      style: 'ha-card { position:relative; overflow:hidden; border-radius:10px 10px 0 0; border-bottom:none; }

        ha-card:before { content:''''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent-color),transparent); opacity:.55; }

        '
    entities:
    - entity: sensor.smol_ota_staged
