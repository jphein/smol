# smol · Control Room — the assembled, themed dashboard view (phosphor-CRT)
# ---------------------------------------------------------------------------
# This is the SINGLE unified view that folds the modular cards in this dir
# (display / nodemgr / ota / topology) into one phosphor-green "Control Room":
# live mesh topology graph, per-node status tiles, retained OTA install (canary),
# the shared OLED glass, and power/solar — matching the project mockup.
#
# INSTALL (vanilla HA, no HACS required for color; card-mod optional for VT323):
#   1. Theme:  copy ../themes/smol.yaml → /config/themes/smol.yaml ; reload themes.
#   2. Fonts:  copy ../www/luna-fonts/*.woff2 → /config/www/luna-fonts/  (served /local/…).
#              (Only needed for the true VT323 pixel-font; card-mod loads it via the theme.
#               Without card-mod the theme still renders phosphor-green in the mono stack.)
#   3. View:   in your dashboard, add a new view → edit in YAML → paste the block below.
#              The view sets `theme: smol`, so the font/color styling scopes to THIS view only.
#
# Exported from the live deploy 2026-07-09. Entities come from packages/smol_mesh.yaml
# + the firmware's MQTT discovery. Retained OTA install buttons are the canonical
# install path (see the OTA card notes); the native Update entity is the "available" hint.
# ---------------------------------------------------------------------------
title: smol · Control Room
path: smol-control
icon: mdi:chip
type: sections
theme: smol
max_columns: 3
sections:
- type: grid
  cards:
  - type: markdown
    content: '# ✦ smol · the Control Room

      *a whole game-console mesh on $3 boards — the Seat, its sigils, the glass they show, and the forge
      that reforges them.*

      '
  - type: heading
    heading: 01 · The Mesh
    heading_style: title
  - type: picture
