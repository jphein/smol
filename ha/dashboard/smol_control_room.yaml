  - type: entities
    title: the Seat & the mesh
    show_header_toggle: false
    entities:
    - type: attribute
      entity: sensor.smol_mesh_channel
      attribute: owner
      name: the Seat (owner id)
      icon: mdi:crown
    - entity: binary_sensor.smol_mesh_reelecting
      name: Seat contested (re-electing)
      icon: mdi:crown-outline
    - type: divider
    - entity: binary_sensor.smol_7_online
      name: id7 · Draconic Dominion
    - entity: binary_sensor.smol_8_online
      name: id8 · Eldritch Nexus
    - entity: binary_sensor.smol_9_online
      name: id9 · Jade Herald
- type: grid
  cards:
  - type: heading
    heading: 02 · The Fleet
    heading_style: title
  - type: vertical-stack
    cards:
    - type: glance
      title: ⟁ id7 · Draconic Dominion — the Seat
      columns: 3
      show_state: true
      entities:
      - entity: binary_sensor.smol_7_online
        name: link
      - entity: sensor.smol_7_status
        name: activity
      - entity: sensor.smol_7_temp
        name: temp
      - entity: sensor.smol_7_voltage
        name: volts
    - type: tile
      entity: update.smol_7_dominion_firmware
      name: Firmware · canary
    - type: entities
      show_header_toggle: false
      entities:
      - type: section
        label: Default screen
      - entity: input_select.smol_7_screen
        name: Screen
      - entity: input_select.smol_7_page
        name: Page (Batt only)
      - entity: input_button.smol_7_apply
        name: Apply
        icon: mdi:send
      - entity: input_button.smol_7_reset
        name: Reset to board default
        icon: mdi:backup-restore
      - entity: sensor.smol_7_config
        name: Commanded (retained)
        icon: mdi:cog
  - type: vertical-stack
    cards:
    - type: glance
      title: ◈ id8 · Eldritch Nexus
      columns: 3
      show_state: true
      entities:
      - entity: binary_sensor.smol_8_online
        name: link
      - entity: sensor.smol_8_status
        name: activity
      - entity: sensor.smol_8_temp
        name: temp
      - entity: sensor.smol_8_voltage
        name: volts
      - entity: sensor.smol_8_rssi
        name: bond
    - type: tile
      entity: update.smol_8_nexus_firmware
      name: Firmware
    - type: entities
      show_header_toggle: false
      entities:
      - type: section
        label: Default screen
      - entity: input_select.smol_8_screen
        name: Screen
      - entity: input_select.smol_8_page
        name: Page (Batt only)
      - entity: input_button.smol_8_apply
        name: Apply
        icon: mdi:send
      - entity: input_button.smol_8_reset
        name: Reset to board default
        icon: mdi:backup-restore
      - entity: sensor.smol_8_config
        name: Commanded (retained)
        icon: mdi:cog
  - type: vertical-stack
    cards:
    - type: glance
      title: ◈ id9 · Jade Herald
      columns: 3
      show_state: true
      entities:
      - entity: binary_sensor.smol_9_online
        name: link
      - entity: sensor.smol_9_status
        name: activity
      - entity: sensor.smol_9_temp
        name: temp
      - entity: sensor.smol_9_voltage
        name: volts
      - entity: sensor.smol_9_rssi
        name: bond
    - type: tile
      entity: update.smol_9_herald_firmware
      name: Firmware
    - type: entities
      show_header_toggle: false
      entities:
      - type: section
        label: Default screen
      - entity: input_select.smol_9_screen
        name: Screen
      - entity: input_select.smol_9_page
        name: Page (Batt only)
      - entity: input_button.smol_9_apply
        name: Apply
        icon: mdi:send
      - entity: input_button.smol_9_reset
        name: Reset to board default
        icon: mdi:backup-restore
      - entity: sensor.smol_9_config
        name: Commanded (retained)
        icon: mdi:cog
  - type: entities
    title: Set all sigils · default screen
    show_header_toggle: false
    entities:
    - entity: input_select.smol_all_screen
      name: Screen (all)
    - entity: input_select.smol_all_page
      name: Page (all)
    - entity: input_button.smol_all_apply
      name: Apply to all
      icon: mdi:send-check
- type: grid
  cards:
  - type: heading
    heading: 03 · The Glass
    heading_style: title
  - type: entities
    title: OLED display · override
    show_header_toggle: false
    entities:
    - entity: input_boolean.smol_display_override
      name: Override battery display
      icon: mdi:pencil
    - type: section
      label: Line sources — text + {entity_id}, e.g. 48V {sensor.48v_battery1_voltage}V (≤12 chars, ~5
        min refresh)
    - entity: input_text.smol_display_line1
      name: Line 1
    - entity: input_text.smol_display_line2
      name: Line 2
    - entity: input_text.smol_display_line3
      name: Line 3
    - type: divider
    - entity: sensor.smol_display_batt
      name: Live · batt (what boards fetch)
      icon: mdi:monitor-dashboard
    - entity: sensor.smol_display_grid
      name: Live · grid
      icon: mdi:transmission-tower
- type: grid
  cards:
  - type: heading
    heading: 04 · Power & Solar
    heading_style: title
  - type: horizontal-stack
    cards:
    - type: gauge
      entity: sensor.48v_battery1_battery
      name: 48V bank
      unit: '%'
      min: 0
      max: 100
      severity:
        green: 60
        yellow: 35
        red: 0
    - type: gauge
      entity: sensor.be_soc
      name: i3 HV
      unit: '%'
      min: 0
      max: 100
      severity:
        green: 50
        yellow: 25
        red: 0
    - type: gauge
      entity: sensor.yurt_consumption
      name: yurt load
      needle: true
  - type: entities
    title: Sources (mirrored to the glass)
    show_header_toggle: false
    entities:
    - entity: sensor.48v_battery1_voltage
      name: 48V bank
    - entity: sensor.be_battery_voltage
      name: BMW i3 HV pack
    - entity: sensor.be_cell_voltage_delta
      name: i3 cell spread
    - entity: sensor.epever_charging_current
      name: Solar charge (EPEver)
    - entity: sensor.l1_power_clamp
      name: Grid L1
    - entity: sensor.l2_power_clamp
      name: Grid L2
- type: grid
  cards:
  - type: heading
    heading: 05 · The Forge · OTA
    heading_style: title
  - type: markdown
    content: 'Reforge firmware **one board at a time** (canary). Target = whatever `tools/ota_publish.sh`
      last staged. Verify a board''s running build advances before the next. *No fleet-unison button by
      design — bootloader revert-on-boot-fail is unproven (ROADMAP D2).*

      '
  - type: entities
    title: Staged target (from ota_publish.sh)
    show_header_toggle: false
    entities:
    - entity: sensor.smol_ota_staged
      name: Staged build
      icon: mdi:package-up
    - type: attribute
      entity: sensor.smol_ota_staged
      attribute: url
      name: Image URL
    - type: attribute
      entity: sensor.smol_ota_staged
      attribute: size
      name: Size (bytes)
  - type: markdown
    content: '**Install** — canary-first. Only the *elected gateway* consumes the retained install; leaves
      flash via USB until they lead. (Firmware version + "update available" show on each Fleet tile above.)

      '
  - type: horizontal-stack
    cards:
    - type: button
      name: Install → id7
      icon: mdi:rocket-launch
      entity: input_button.smol_ota_install_7
      show_state: false
      tap_action:
        action: perform-action
        perform_action: input_button.press
        target:
          entity_id: input_button.smol_ota_install_7
    - type: button
      name: installs when id8 leads
      icon: mdi:lock-outline
      entity: input_button.smol_ota_install_8
      show_state: false
      tap_action:
        action: none
      card_mod:
        style: 'ha-card { opacity: 0.45; }'
    - type: button
      name: installs when id9 leads
      icon: mdi:lock-outline
      entity: input_button.smol_ota_install_9
      show_state: false
      tap_action:
        action: none
      card_mod:
        style: 'ha-card { opacity: 0.45; }'
